<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的网盘 | 能量山：零号协议</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="/js/auth-manager.js"></script>
    <script src="https://gosspublic.alicdn.com/aliyun-oss-sdk-6.18.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fm-bg: #f0f2f5;
            --fm-card-bg: rgba(255, 255, 255, 0.95);
            --fm-primary: #1890ff;
            --fm-primary-dark: #096dd9;
            --fm-accent: #40a9ff;
            --fm-text: #262626;
            --fm-text-secondary: #8c8c8c;
            --fm-text-light: #bfbfbf;
            --fm-border: rgba(0, 0, 0, 0.06);
            --fm-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --fm-shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.12);
            --fm-radius: 12px;
            --fm-radius-sm: 8px;
            --fm-danger: #ff4d4f;
            --fm-success: #52c41a;
            --fm-warning: #faad14;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--fm-bg);
            color: var(--fm-text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 180px;
            background: linear-gradient(135deg, #1890ff 0%, #722ed1 100%);
            z-index: 0;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--fm-border);
            padding: 0 16px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-left { display: flex; align-items: center; gap: 12px; }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--fm-bg);
            color: var(--fm-text);
            text-decoration: none;
            font-size: 18px;
            transition: all 0.2s;
        }
        .back-btn:hover { background: #e8e8e8; }

        .navbar-title { font-size: 18px; font-weight: 600; color: var(--fm-text); }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 16px 80px;
            position: relative;
            z-index: 1;
        }

        .storage-card {
            background: var(--fm-card-bg);
            border-radius: var(--fm-radius);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--fm-shadow);
        }

        .storage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .storage-title { font-size: 14px; color: var(--fm-text-secondary); }

        .storage-value { font-size: 24px; font-weight: 600; color: var(--fm-primary); }
        .storage-quota { font-size: 12px; color: var(--fm-text-light); margin-left: 8px; }

        .storage-bar {
            height: 8px;
            background: #e8e8e8;
            border-radius: 4px;
            overflow: hidden;
        }

        .storage-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--fm-primary), var(--fm-accent));
            border-radius: 4px;
            transition: width 0.3s;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            border: none;
            border-radius: var(--fm-radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--fm-primary);
            color: white;
        }
        .btn-primary:hover { background: var(--fm-primary-dark); }

        .btn-default {
            background: white;
            color: var(--fm-text);
            border: 1px solid var(--fm-border);
        }
        .btn-default:hover { border-color: var(--fm-primary); color: var(--fm-primary); }

        .btn-danger {
            background: var(--fm-danger);
            color: white;
        }
        .btn-danger:hover { background: #cf1322; }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: var(--fm-card-bg);
            border-radius: var(--fm-radius-sm);
            margin-bottom: 16px;
            font-size: 14px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .breadcrumb-item {
            color: var(--fm-text-secondary);
            cursor: pointer;
        }
        .breadcrumb-item:hover { color: var(--fm-primary); }
        .breadcrumb-item.active { color: var(--fm-text); font-weight: 500; }
        .breadcrumb-sep { color: var(--fm-text-light); }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-list .file-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: var(--fm-card-bg);
            border-radius: var(--fm-radius-sm);
            box-shadow: var(--fm-shadow);
            transition: all 0.2s;
        }

        .file-list .file-item:hover {
            box-shadow: var(--fm-shadow-hover);
        }

        .file-item {
            padding: 16px;
            background: var(--fm-card-bg);
            border-radius: var(--fm-radius-sm);
            box-shadow: var(--fm-shadow);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .file-item:hover {
            box-shadow: var(--fm-shadow-hover);
            transform: translateY(-2px);
        }

        .file-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border-radius: 8px;
        }

        .file-icon.image { background: #e6f7ff; color: #1890ff; }
        .file-icon.video { background: #fff0f6; color: #eb2f96; }
        .file-icon.audio { background: #f9f0ff; color: #722ed1; }
        .file-icon.document { background: #fff7e6; color: #fa8c16; }
        .file-icon.archive { background: #f6ffed; color: #52c41a; }
        .file-icon.folder { background: #fffbe6; color: #faad14; }
        .file-icon.other { background: #f5f5f5; color: #8c8c8c; }

        .file-name {
            font-size: 13px;
            color: var(--fm-text);
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .file-size {
            font-size: 12px;
            color: var(--fm-text-light);
            margin-top: 4px;
        }

        .file-actions {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .file-item:hover .file-actions { opacity: 1; }

        .file-action-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 4px;
            background: var(--fm-bg);
            color: var(--fm-text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .file-action-btn:hover { background: var(--fm-primary); color: white; }
        .file-action-btn.delete:hover { background: var(--fm-danger); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--fm-text-secondary);
        }

        .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }

        .upload-zone {
            border: 2px dashed var(--fm-border);
            border-radius: var(--fm-radius);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
            background: var(--fm-card-bg);
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--fm-primary);
            background: #e6f7ff;
        }

        .upload-icon { font-size: 48px; color: var(--fm-primary); margin-bottom: 12px; }
        .upload-text { font-size: 14px; color: var(--fm-text-secondary); }

        .upload-progress {
            background: var(--fm-card-bg);
            border-radius: var(--fm-radius-sm);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--fm-shadow);
        }

        .upload-progress-name {
            font-size: 13px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .upload-progress-bar {
            height: 6px;
            background: #e8e8e8;
            border-radius: 3px;
            overflow: hidden;
        }

        .upload-progress-fill {
            height: 100%;
            background: var(--fm-primary);
            border-radius: 3px;
            transition: width 0.2s;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
        }

        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal {
            background: white;
            border-radius: var(--fm-radius);
            padding: 24px;
            width: 90%;
            max-width: 400px;
            transform: scale(0.9);
            transition: transform 0.2s;
        }

        .modal-overlay.active .modal { transform: scale(1); }

        .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

        .modal-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--fm-border);
            border-radius: var(--fm-radius-sm);
            font-size: 14px;
            margin-bottom: 16px;
        }

        .modal-input:focus { outline: none; border-color: var(--fm-primary); }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .view-mode-toggle {
            display: flex;
            background: var(--fm-bg);
            border-radius: var(--fm-radius-sm);
            padding: 2px;
        }

        .view-mode-btn {
            padding: 6px 12px;
            border: none;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: var(--fm-text-secondary);
            transition: all 0.2s;
        }

        .view-mode-btn.active {
            background: white;
            color: var(--fm-primary);
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        .share-link-box {
            background: var(--fm-bg);
            padding: 12px;
            border-radius: var(--fm-radius-sm);
            word-break: break-all;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 2000;
        }

        .toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

        /* 底部导航 */
        .fm-bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--fm-border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 100;
        }

        .fm-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--fm-text-secondary);
            padding: 4px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .fm-nav-item:hover, .fm-nav-item.active {
            color: var(--fm-primary);
            background: rgba(24, 144, 255, 0.1);
        }

        .fm-nav-icon { font-size: 20px; margin-bottom: 2px; }
        .fm-nav-label { font-size: 12px; }

        body { padding-bottom: 70px; }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>

    <nav class="navbar">
        <div class="navbar-left">
            <a href="javascript:history.back()" class="back-btn">←</a>
            <span class="navbar-title">我的网盘</span>
        </div>
        <div class="view-mode-toggle">
            <button class="view-mode-btn active" data-mode="grid" onclick="fileManager.setViewMode('grid')">▦</button>
            <button class="view-mode-btn" data-mode="list" onclick="fileManager.setViewMode('list')">☰</button>
        </div>
    </nav>

    <div class="container">
        <div class="storage-card">
            <div class="storage-header">
                <span class="storage-title">存储空间</span>
                <span class="storage-value" id="storageUsed">0 MB</span>
                <span class="storage-quota" id="storageQuota"></span>
            </div>
            <div class="storage-bar">
                <div class="storage-bar-fill" id="storageBar" style="width: 0%"></div>
            </div>
        </div>

        <div class="toolbar">
            <button class="btn btn-primary" onclick="fileManager.showUploadDialog()">↑ 上传文件</button>
            <button class="btn btn-default" onclick="fileManager.showCreateFolderDialog()">+ 新建文件夹</button>
            <button class="btn btn-default" id="backFolderBtn" onclick="fileManager.goBack()" style="display:none;">← 返回上级</button>
        </div>

        <div class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item active" onclick="fileManager.navigateTo(0)">全部文件</span>
        </div>

        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">☁️</div>
            <div class="upload-text">点击或拖拽文件到此处上传</div>
        </div>
        <input type="file" id="fileInput" multiple style="display:none" onchange="fileManager.handleFiles(this.files)">

        <div id="uploadProgress"></div>

        <div class="file-grid" id="fileContainer"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="fileManager.closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-title" id="modalTitle">新建文件夹</div>
            <div id="modalContent">
                <input type="text" class="modal-input" id="modalInput" placeholder="请输入文件夹名称">
            </div>
            <div class="modal-actions">
                <button class="btn btn-default" onclick="fileManager.closeModal()">取消</button>
                <button class="btn btn-primary" id="modalConfirm" onclick="fileManager.confirmModal()">确定</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = '';
        let token = AuthManager.getToken();

        if (!token) {
            window.location.href = '/game.html';
        }

        const fileManager = {
            currentFolderId: 0,
            folderPath: [{ id: 0, name: '全部文件' }],
            viewMode: 'grid',
            currentModalAction: null,
            currentRenameId: null,
            currentRenameType: null,

            // 广播刷新信号给其他标签页
            broadcastRefresh() {
                // 设置一个时间戳作为刷新标记，触发 storage 事件
                localStorage.setItem('file-manager-refresh', Date.now().toString());
            },

            async init() {
                await this.loadFiles();
                // 不在这里调用broadcastRefresh，避免初始加载时重复请求
                this.setupDragUpload();
            },

            async loadFiles() {
                try {
                    // 同时获取文件夹列表、文件列表和上传凭证（包含配额信息）
                    const [foldersRes, filesRes, tokenRes] = await Promise.all([
                        fetch(API_BASE + '/api/file-manager/folders?parent_id=' + this.currentFolderId, {
                            headers: { 'Authorization': 'Bearer ' + token }
                        }),
                        fetch(API_BASE + '/api/file-manager/files?folder_id=' + this.currentFolderId, {
                            headers: { 'Authorization': 'Bearer ' + token }
                        }),
                        fetch(API_BASE + '/api/file-manager/upload-token', {
                            headers: { 'Authorization': 'Bearer ' + token }
                        })
                    ]);

                    const foldersData = await foldersRes.json();
                    const data = await filesRes.json();
                    const tokenData = await tokenRes.json();

                    if (data.success) {
                        // 合并文件夹和文件，文件夹显示在前面
                        const folders = foldersData.success ? foldersData.data : [];
                        const files = data.data || [];
                        const combinedFiles = [...folders.map(f => ({...f, is_folder: true, file_type: 'folder', file_size: 0})), ...files];
                        this.renderFiles(combinedFiles);
                        // 使用上传凭证返回的配额信息
                        const quota = tokenData.success ? tokenData.data.storage_quota : 1073741824;
                        this.updateStorage(data.storage, quota);
                        this.updateBreadcrumb();
                    } else {
                        this.showToast(data.error || '加载失败');
                    }
                } catch (err) {
                    console.error('加载文件失败:', err);
                    this.showToast('加载失败');
                }
            },

            renderFiles(files) {
                const container = document.getElementById('fileContainer');
                container.className = this.viewMode === 'grid' ? 'file-grid' : 'file-list';

                if (files.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <div class="empty-icon">📁</div>
                            <div>暂无文件，上传或创建文件夹开始使用</div>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = files.map(file => {
                    const isFolder = file.is_folder || file.file_type === 'folder';
                    const iconClass = file.file_type || 'other';
                    const iconMap = {
                        image: '🖼️', video: '🎬', audio: '🎵', document: '📄', archive: '📦', folder: '📁', other: '📎'
                    };
                    const icon = iconMap[iconClass] || '📎';
                    
                    const clickHandler = isFolder ? `fileManager.openFolder(${file.id}, '${this.escapeHtml(file.folder_name || file.file_name)}')` : `fileManager.previewFile(${file.id})`;

                    if (this.viewMode === 'list') {
                        return `
                            <div class="file-item" onclick="${clickHandler}">
                                <div class="file-icon ${iconClass}">${icon}</div>
                                <div style="flex:1;min-width:0;margin-left:12px;">
                                    <div class="file-name">${this.escapeHtml(file.folder_name || file.file_name)}</div>
                                    <div class="file-size">${isFolder ? '文件夹' : this.formatSize(file.file_size)}</div>
                                </div>
                                <div class="file-actions" onclick="event.stopPropagation()">
                                    <button class="file-action-btn" onclick="fileManager.showRenameDialog(${file.id}, '${this.escapeHtml(file.folder_name || file.file_name)}', ${isFolder})" title="重命名">✏</button>
                                    ${isFolder ? '' : '<button class="file-action-btn" onclick="fileManager.downloadFile(' + file.id + ')" title="下载">⬇</button>'}
                                    ${isFolder ? '' : '<button class="file-action-btn" onclick="fileManager.shareFile(' + file.id + ')" title="分享">🔗</button>'}
                                    <button class="file-action-btn delete" onclick="fileManager.delete${isFolder ? 'Folder' : 'File'}(${file.id})" title="删除">🗑</button>
                                </div>
                            </div>
                        `;
                    }

                    return `
                        <div class="file-item" onclick="${clickHandler}">
                            <div class="file-icon ${iconClass}">${icon}</div>
                            <div class="file-name">${this.escapeHtml(file.folder_name || file.file_name)}</div>
                            <div class="file-size">${isFolder ? '文件夹' : this.formatSize(file.file_size)}</div>
                            <div class="file-actions">
                                <button class="file-action-btn" onclick="event.stopPropagation(); fileManager.showRenameDialog(${file.id}, '${this.escapeHtml(file.folder_name || file.file_name)}', ${isFolder})" title="重命名">✏</button>
                                ${isFolder ? '' : '<button class="file-action-btn" onclick="event.stopPropagation(); fileManager.downloadFile(' + file.id + ')" title="下载">⬇</button>'}
                                ${isFolder ? '' : '<button class="file-action-btn" onclick="event.stopPropagation(); fileManager.shareFile(' + file.id + ')" title="分享">🔗</button>'}
                                <button class="file-action-btn delete" onclick="event.stopPropagation(); fileManager.delete${isFolder ? 'Folder' : 'File'}(${file.id})" title="删除">🗑</button>
                            </div>
                        </div>
                    `;
                }).join('');
            },

            updateStorage(storage, quota) {
                const usedMB = storage.used_mb || 0;
                const quotaMB = quota ? Math.round(quota / 1024 / 1024) : 1024;
                document.getElementById('storageUsed').textContent = usedMB.toFixed(2) + ' MB';
                document.getElementById('storageQuota').textContent = '/ ' + quotaMB + ' MB';
                const percent = Math.min((usedMB / quotaMB) * 100, 100);
                document.getElementById('storageBar').style.width = percent + '%';
            },

            updateBreadcrumb() {
                const breadcrumb = document.getElementById('breadcrumb');
                breadcrumb.innerHTML = this.folderPath.map((folder, index) => {
                    const isLast = index === this.folderPath.length - 1;
                    return `
                        <span class="breadcrumb-item ${isLast ? 'active' : ''}" 
                              onclick="fileManager.navigateTo(${folder.id})">
                            ${folder.name}
                        </span>
                        ${!isLast ? '<span class="breadcrumb-sep">/</span>' : ''}
                    `;
                }).join('');

                document.getElementById('backFolderBtn').style.display = this.currentFolderId > 0 ? 'inline-flex' : 'none';
            },

            setViewMode(mode) {
                this.viewMode = mode;
                document.querySelectorAll('.view-mode-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });
                this.loadFiles();
                this.broadcastRefresh();
            },

            navigateTo(folderId) {
                if (folderId === 0) {
                    this.folderPath = [{ id: 0, name: '全部文件' }];
                    this.currentFolderId = 0;
                } else {
                    const index = this.folderPath.findIndex(f => f.id === folderId);
                    if (index >= 0) {
                        this.folderPath = this.folderPath.slice(0, index + 1);
                    }
                    this.currentFolderId = folderId;
                }
                this.loadFiles();
                this.broadcastRefresh();
            },

            openFolder(folderId, folderName) {
                this.folderPath.push({ id: folderId, name: folderName });
                this.currentFolderId = folderId;
                this.loadFiles();
                this.broadcastRefresh();
                this.loadFiles();
            },

            goBack() {
                if (this.folderPath.length > 1) {
                    this.folderPath.pop();
                    this.currentFolderId = this.folderPath[this.folderPath.length - 1].id;
                    this.loadFiles();
                    this.broadcastRefresh();
                }
            },

            showUploadDialog() {
                document.getElementById('fileInput').click();
            },

            setupDragUpload() {
                const zone = document.getElementById('uploadZone');
                zone.addEventListener('dragover', e => {
                    e.preventDefault();
                    zone.classList.add('dragover');
                });
                zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
                zone.addEventListener('drop', e => {
                    e.preventDefault();
                    zone.classList.remove('dragover');
                    this.handleFiles(e.dataTransfer.files);
                });
            },

            async handleFiles(files) {
                for (const file of files) {
                    await this.uploadFile(file);
                }
            },

            async uploadFile(file) {
                const progressContainer = document.getElementById('uploadProgress');
                const progressId = 'upload_' + Date.now();
                const progressHtml = `
                    <div class="upload-progress" id="${progressId}">
                        <div class="upload-progress-name">
                            <span>${this.escapeHtml(file.name)}</span>
                            <span class="upload-percent">0%</span>
                        </div>
                        <div class="upload-progress-bar">
                            <div class="upload-progress-fill" style="width: 0%"></div>
                        </div>
                    </div>
                `;
                progressContainer.insertAdjacentHTML('beforeend', progressHtml);

                const progressEl = document.getElementById(progressId);
                const fillEl = progressEl.querySelector('.upload-progress-fill');
                const percentEl = progressEl.querySelector('.upload-percent');

                try {
                    const stsRes = await fetch(API_BASE + '/api/file-manager/upload-token', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    const stsData = await stsRes.json();
                    if (!stsData.success) throw new Error(stsData.error);
                    const sts = stsData.data;

                    const objectName = 'user-files/' + Date.now() + '_' + file.name;
                    
                    const useAccelerate = sts.useAccelerate === true;
                    const endpoint = useAccelerate ? (sts.accelerateDomain || 'oss-accelerate.aliyuncs.com') : 'oss-cn-shenzhen.aliyuncs.com';
                    
                    const clientConfig = {
                        region: 'oss-cn-shenzhen',
                        bucket: sts.bucket,
                        accessKeyId: sts.accessKeyId,
                        accessKeySecret: sts.accessKeySecret,
                        endpoint: endpoint,
                        cname: false,
                        secure: true,
                        timeout: 600000
                    };

                    if (sts.useLongTermKey) {
                        clientConfig.authorizationV4 = true;
                    } else if (sts.stsToken) {
                        clientConfig.stsToken = sts.stsToken;
                    }

                    const client = new OSS(clientConfig);

                    await client.multipartUpload(objectName, file, {
                        progress: p => {
                            const percent = Math.round(p * 100);
                            fillEl.style.width = percent + '%';
                            percentEl.textContent = percent + '%';
                        },
                        partSize: 5 * 1024 * 1024,
                        parallel: 4
                    });

                    const registerRes = await fetch(API_BASE + '/api/file-manager/files', {
                        method: 'POST',
                        headers: { 
                            'Authorization': 'Bearer ' + token,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            file_name: file.name,
                            file_size: file.size,
                            oss_key: objectName,
                            folder_id: this.currentFolderId
                        })
                    });
                    const registerData = await registerRes.json();

                    if (registerData.success) {
                        this.showToast('上传成功');
                        progressEl.remove();
                        this.loadFiles();
                        this.broadcastRefresh();
                    } else {
                        // 处理存储空间不足的错误
                        if (registerData.details) {
                            const d = registerData.details;
                            throw new Error(`存储空间不足！\n配额: ${d.quota_mb}MB\n已用: ${d.used_mb}MB\n剩余: ${d.available_mb}MB\n文件大小: ${d.file_size_mb}MB`);
                        }
                        throw new Error(registerData.error);
                    }
                } catch (err) {
                    console.error('上传失败:', err);
                    progressEl.innerHTML = `<span style="color:red">上传失败: ${err.message}</span>`;
                }
            },

            async downloadFile(fileId) {
                try {
                    const res = await fetch(API_BASE + '/api/file-manager/files/' + fileId, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    const data = await res.json();
                    if (data.success) {
                        window.open(data.data.file_url, '_blank');
                    } else {
                        this.showToast(data.error || '获取文件失败');
                    }
                } catch (err) {
                    this.showToast('下载失败');
                }
            },

            async shareFile(fileId) {
                try {
                    const res = await fetch(API_BASE + '/api/file-manager/files/' + fileId + '/share', {
                        method: 'POST',
                        headers: { 
                            'Authorization': 'Bearer ' + token,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ expires_hours: 24 })
                    });
                    const data = await res.json();
                    if (data.success) {
                        document.getElementById('modalTitle').textContent = '分享链接';
                        document.getElementById('modalContent').innerHTML = `
                            <div class="share-link-box">${data.data.share_url}</div>
                            <button class="btn-copy" onclick="fileManager.copyShareLink('${data.data.share_url}')" style="margin-top:10px;padding:8px 20px;background:#1890ff;color:#fff;border:none;border-radius:4px;cursor:pointer;">一键复制链接</button>
                            <p style="font-size:12px;color:#8c8c8c;margin-top:10px;">链接24小时内有效</p>
                        `;
                        this.currentModalAction = null;
                        this.openModal();
                    } else {
                        this.showToast(data.error || '分享失败');
                    }
                } catch (err) {
                    this.showToast('分享失败');
                }
            },

            // 一键复制分享链接
            copyShareLink(url) {
                navigator.clipboard.writeText(url).then(() => {
                    this.showToast('复制成功');
                    this.closeModal();
                }).catch(() => {
                    // 兼容旧浏览器
                    const input = document.createElement('input');
                    input.value = url;
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand('copy');
                    document.body.removeChild(input);
                    this.showToast('复制成功');
                    this.closeModal();
                });
            },

            async deleteFile(fileId) {
                if (!confirm('确定要删除这个文件吗？')) return;
                try {
                    const res = await fetch(API_BASE + '/api/file-manager/files/' + fileId, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    const data = await res.json();
                    if (data.success) {
                        this.showToast('删除成功');
                        this.loadFiles();
                        this.broadcastRefresh();
                    } else {
                        this.showToast(data.error || '删除失败');
                    }
                } catch (err) {
                    this.showToast('删除失败');
                }
            },

            async deleteFolder(folderId) {
                if (!confirm('确定要删除这个文件夹吗？')) return;
                try {
                    const res = await fetch(API_BASE + '/api/file-manager/folders/' + folderId, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    const data = await res.json();
                    if (data.success) {
                        this.showToast('删除成功');
                        this.loadFiles();
                        this.broadcastRefresh();
                    } else {
                        this.showToast(data.error || '删除失败');
                    }
                } catch (err) {
                    this.showToast('删除失败');
                }
            },

            showRenameDialog(fileId, fileName, isFolder) {
                document.getElementById('modalTitle').textContent = isFolder ? '重命名文件夹' : '重命名文件';
                document.getElementById('modalContent').innerHTML = '<input type="text" class="modal-input" id="modalInput" value="' + this.escapeHtml(fileName) + '">';
                this.currentModalAction = 'rename';
                this.currentRenameId = fileId;
                this.currentRenameType = isFolder ? 'folder' : 'file';
                this.openModal();
            },

            async renameFile(fileId, newName) {
                if (!newName || newName.trim() === '') {
                    this.showToast('名称不能为空');
                    return;
                }
                try {
                    const res = await fetch(API_BASE + '/api/file-manager/files/' + fileId, {
                        method: 'PUT',
                        headers: { 
                            'Authorization': 'Bearer ' + token,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ file_name: newName.trim() })
                    });
                    const data = await res.json();
                    if (data.success) {
                        this.showToast('重命名成功');
                        this.closeModal();
                        this.loadFiles();
                        this.broadcastRefresh();
                    } else {
                        this.showToast(data.error || '重命名失败');
                    }
                } catch (err) {
                    this.showToast('重命名失败');
                }
            },

            async renameFolder(folderId, newName) {
                if (!newName || newName.trim() === '') {
                    this.showToast('名称不能为空');
                    return;
                }
                try {
                    const res = await fetch(API_BASE + '/api/file-manager/folders/' + folderId, {
                        method: 'PUT',
                        headers: { 
                            'Authorization': 'Bearer ' + token,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ folder_name: newName.trim() })
                    });
                    const data = await res.json();
                    if (data.success) {
                        this.showToast('重命名成功');
                        this.closeModal();
                        this.loadFiles();
                        this.broadcastRefresh();
                    } else {
                        this.showToast(data.error || '重命名失败');
                    }
                } catch (err) {
                    this.showToast('重命名失败');
                }
            },

            async previewFile(fileId) {
                try {
                    const res = await fetch(API_BASE + '/api/file-manager/files/' + fileId, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    const data = await res.json();
                    if (data.success) {
                        window.open(data.data.file_url, '_blank');
                    }
                } catch (err) {
                    console.error('预览失败:', err);
                }
            },

            showCreateFolderDialog() {
                document.getElementById('modalTitle').textContent = '新建文件夹';
                document.getElementById('modalContent').innerHTML = '<input type="text" class="modal-input" id="modalInput" placeholder="请输入文件夹名称">';
                this.currentModalAction = 'createFolder';
                this.openModal();
            },

            openModal() {
                document.getElementById('modalOverlay').classList.add('active');
                setTimeout(() => document.getElementById('modalInput')?.focus(), 100);
            },

            closeModal(e) {
                if (e && e.target !== e.currentTarget) return;
                document.getElementById('modalOverlay').classList.remove('active');
                this.currentModalAction = null;
            },

            async confirmModal() {
                const input = document.getElementById('modalInput');
                const value = input?.value?.trim();
                if (!value) {
                    this.showToast('请输入内容');
                    return;
                }

                if (this.currentModalAction === 'createFolder') {
                    try {
                        const res = await fetch(API_BASE + '/api/file-manager/folders', {
                            method: 'POST',
                            headers: { 
                                'Authorization': 'Bearer ' + token,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ folder_name: value, parent_id: this.currentFolderId })
                        });
                        const data = await res.json();
                        if (data.success) {
                            this.showToast('创建成功');
                            this.closeModal();
                            this.loadFiles();
                            this.broadcastRefresh();
                        } else {
                            this.showToast(data.error || '创建失败');
                        }
                    } catch (err) {
                        this.showToast('创建失败');
                    }
                } else if (this.currentModalAction === 'rename') {
                    if (this.currentRenameType === 'folder') {
                        await this.renameFolder(this.currentRenameId, value);
                    } else {
                        await this.renameFile(this.currentRenameId, value);
                    }
                }
            },

            formatSize(bytes) {
                if (!bytes || bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            showToast(message) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }
        };

        fileManager.init();

        // 监听 localStorage 变化，实现多标签页同步
        window.addEventListener('storage', (e) => {
            if (e.key === 'file-manager-refresh' && e.newValue) {
                // 收到刷新信号，重新加载文件列表
                fileManager.loadFiles();
                // 清除刷新标记
                localStorage.removeItem('file-manager-refresh');
            }
        });
    </script>
