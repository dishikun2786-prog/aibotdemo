<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件分享 - 能量山</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .content {
            padding: 30px;
        }
        .file-icon {
            text-align: center;
            font-size: 64px;
            margin-bottom: 20px;
        }
        .file-name {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 10px;
            word-break: break-all;
        }
        .file-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            color: #666;
            font-size: 14px;
        }
        .file-info span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #eee;
        }
        .view-count {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .error {
            text-align: center;
            padding: 60px 20px;
            color: #ff4d4f;
        }
        .error h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .error p {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>文件分享</h1>
            <p>来自能量山网盘</p>
        </div>
        <div class="content" id="content">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        
        // 获取分享码
        function getShareCode() {
            const params = new URLSearchParams(window.location.search);
            return params.get('code');
        }

        // 获取文件图标
        function getFileIcon(fileType) {
            const icons = {
                image: '🖼️',
                video: '🎬',
                audio: '🎵',
                document: '📄',
                other: '📁'
            };
            return icons[fileType] || icons.other;
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 渲染文件信息
        function renderFile(data) {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="file-icon">${getFileIcon(data.file_type)}</div>
                <div class="file-name">${data.file_name}</div>
                <div class="file-info">
                    <span>📦 ${formatFileSize(data.file_size)}</span>
                    <span>👁️ ${data.view_count} 次浏览</span>
                </div>
                <a href="${data.file_url}" target="_blank" class="btn">打开/下载文件</a>
                <button onclick="copyLink('${data.file_url}')" class="btn btn-secondary">复制文件链接</button>
                <div class="view-count">分享来自能量山网盘</div>
            `;
        }

        // 渲染错误信息
        function renderError(message) {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="error">
                    <h2>⚠️</h2>
                    <h2>无法访问</h2>
                    <p>${message}</p>
                </div>
            `;
        }

        // 复制链接
        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                alert('复制成功');
            }).catch(() => {
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                alert('复制成功');
            });
        }

        // 加载分享文件信息
        async function loadShareFile() {
            const code = getShareCode();
            if (!code) {
                renderError('分享码无效');
                return;
            }

            try {
                const res = await fetch(API_BASE + '/api/file-manager/shared/' + code);
                const data = await res.json();

                if (data.success) {
                    renderFile(data.data);
                } else {
                    renderError(data.error || '分享链接无效或已过期');
                }
            } catch (err) {
                renderError('加载失败，请稍后重试');
            }
        }

        // 页面加载
        loadShareFile();
    </script>
</body>
</html>
