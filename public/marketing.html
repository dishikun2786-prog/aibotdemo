        // 下载海报 - 使用Canvas绘制避免跨域问题
        async function downloadPoster() {
            const posterContent = document.getElementById('posterContent');

            // 获取海报数据
            try {
                const res = await fetch(API_BASE + '/api/marketing/poster/' + profileData.user_id);
                const result = await res.json();

                if (!result.success || !result.data) {
                    alert('获取海报数据失败');
                    return;
                }

                const data = result.data;

                // 创建Canvas
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                // 设置海报尺寸
                canvas.width = 400;
                canvas.height = 600;

                // 1. 首先绘制整个海报的背景渐变色
                const bgGradient = ctx.createLinearGradient(0, 0, 400, 600);
                bgGradient.addColorStop(0, '#667eea');
                bgGradient.addColorStop(1, '#764ba2');
                ctx.fillStyle = bgGradient;
                ctx.fillRect(0, 0, 400, 600);

                // 2. 绘制封面图片（如果有）
                if (data.cover) {
                    try {
                        const coverImg = await loadImage(data.cover);
                        // 绘制封面图片（拉伸填充顶部区域）
                        ctx.drawImage(coverImg, 0, 0, 400, 200);
                    } catch (e) {
                        // 封面加载失败，保持渐变背景
                    }
                }

                // 绘制头像背景
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(200, 170, 50, 0, Math.PI * 2);
                ctx.fill();

                // 绘制头像
                if (data.avatar) {
                    try {
                        const avatarImg = await loadImage(data.avatar);
                        ctx.save();
                        ctx.beginPath();
                        ctx.arc(200, 170, 45, 0, Math.PI * 2);
                        ctx.clip();
                        ctx.drawImage(avatarImg, 155, 125, 90, 90);
                        ctx.restore();
                    } catch (e) {
                        // 头像加载失败，绘制首字母
                        ctx.fillStyle = '#4F46E5';
                        ctx.font = 'bold 40px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText((data.display_name || '?').charAt(0).toUpperCase(), 200, 170);
                    }
                } else {
                    ctx.fillStyle = '#4F46E5';
                    ctx.font = 'bold 40px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText((data.display_name || '?').charAt(0).toUpperCase(), 200, 170);
                }

                // 绘制名称
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(data.display_name || '用户', 200, 250);

                // 绘制简介
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.font = '14px Arial';
                const bio = data.bio || '欢迎访问我的主页';
                // 合理换行：每行约20个中文字符宽度
                const maxWidth = 340;
                const lineHeight = 22;
                const x = 30;
                let y = 280;
                
                // 将文字按行分割
                let line = '';
                for (let i = 0; i < bio.length; i++) {
                    const char = bio[i];
                    // 粗略估算中文字符宽度约14px，英文约8px
                    const charWidth = /[\u4e00-\u9fa5]/.test(char) ? 14 : 8;
                    
                    if (x + ctx.measureText(line).width + charWidth > maxWidth + 30 || char === '\n') {
                        // 换行
                        ctx.fillText(line, 200, y);
                        y += lineHeight;
                        line = char === '\n' ? '' : char;
                    } else {
                        line += char;
                    }
                }
                // 绘制最后一行
                if (line) {
                    ctx.fillText(line, 200, y);
                }

                // 绘制二维码背景（二维码区域是浅色背景）
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.roundRect(125, 350, 150, 170, 10);
                ctx.fill();

                // 绘制二维码
                try {
                    const qrImg = await loadImage(data.qrcode);
                    ctx.drawImage(qrImg, 150, 360, 100, 100);
                } catch (e) {
                    console.error('二维码加载失败:', e);
                }

                // 绘制提示（在二维码下方，白色背景内用深色文字）
                ctx.fillStyle = '#666666';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('扫码了解更多', 200, 490);

                // 绘制底部文字
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.font = '10px Arial';
                ctx.fillText('Powered by 能量山', 200, 560);

                // 下载图片
                canvas.toBlob(function(blob) {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = `marketing-poster-${profileData.user_id}.png`;
                    link.href = url;
                    link.click();
                    URL.revokeObjectURL(url);
                }, 'image/png');

            } catch (err) {
                console.error('生成海报失败:', err);
                alert('生成海报失败，请重试');
            }
        }

        // 辅助函数：加载图片返回Promise
        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = src;
            });
        }

        // 打开编辑弹窗
        async function openEditModal() {
            if (!isOwner) return;

            // 填充表单
            document.getElementById('editDisplayName').value = profileData.display_name || '';
            document.getElementById('editBio').value = profileData.bio || '';
            document.getElementById('editWechat').value = profileData.wechat_qq || '';
            document.getElementById('editPhone').value = profileData.phone || '';
            document.getElementById('editEmail').value = profileData.email || '';
            document.getElementById('editIsPublic').checked = profileData.is_public !== false;
            document.getElementById('editCustomServiceLink').value = profileData.custom_service_link || '';

            // 加载自定义菜单
            loadCustomMenuForEdit();

            // 头像预览
            const avatarPreview = document.getElementById('editAvatarPreview');
            if (profileData.avatar_url) {
                avatarPreview.src = profileData.avatar_url;
                avatarPreview.style.background = '';
                avatarPreview.innerHTML = '';
            } else {
                avatarPreview.style.background = profileData.avatar_color || '#4F46E5';
                avatarPreview.innerHTML = (profileData.display_name || profileData.username || '?').charAt(0).toUpperCase();
                avatarPreview.style.display = 'flex';
                avatarPreview.style.alignItems = 'center';
                avatarPreview.style.justifyContent = 'center';
                avatarPreview.style.color = 'white';
                avatarPreview.style.fontSize = '24px';
            }

            // 封面预览
            const coverPreview = document.getElementById('editCoverPreview');
            if (profileData.cover_image) {
                coverPreview.src = profileData.cover_image;
                coverPreview.style.background = '';
            } else {
                coverPreview.src = '';
                coverPreview.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            }

            // 自定义链接
            const linksContainer = document.getElementById('customLinksEdit');
            linksContainer.innerHTML = '';
            (profileData.custom_links || []).forEach(link => {
                addCustomLink(link.title, link.url);
            });

            document.getElementById('editModal').classList.add('active');
        }

        // 关闭编辑弹窗
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editAvatarFile = null;
            editCoverFile = null;
        }

        // 预览头像
        function previewAvatar(input) {
            if (input.files && input.files[0]) {
                editAvatarFile = input.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('editAvatarPreview').src = e.target.result;
                };
                reader.readAsDataURL(editAvatarFile);
            }
        }

        // 预览封面
        function previewCover(input) {
            if (input.files && input.files[0]) {
                editCoverFile = input.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('editCoverPreview').src = e.target.result;
                };
                reader.readAsDataURL(editCoverFile);
            }
        }

        // 添加自定义链接
        function addCustomLink(title = '', url = '') {
            const container = document.getElementById('customLinksEdit');
            const div = document.createElement('div');
            div.className = 'custom-link-item';
            div.innerHTML = `
                <input type="text" class="form-input" placeholder="标题" value="${title}" />
                <input type="url" class="form-input" placeholder="URL" value="${url}" />
                <button type="button" class="custom-link-remove" onclick="this.parentElement.remove()">&times;</button>
            `;
            container.appendChild(div);
        }

        // 保存资料
        async function saveProfile() {
            const token = localStorage.getItem('authToken');
            if (!token) {
                alert('请先登录');
                window.location.href = '/login.html';
                return;
            }

            // 收集自定义链接
            const customLinks = [];
            document.querySelectorAll('.custom-link-item').forEach(item => {
                const inputs = item.querySelectorAll('input');
                if (inputs[0].value && inputs[1].value) {
                    customLinks.push({ title: inputs[0].value, url: inputs[1].value });
                }
            });

            // 处理客服链接
            const customServiceLink = document.getElementById('editCustomServiceLink').value.trim();

            // 处理自定义菜单
            const customMenu = getCustomMenuFromForm();

            const data = {
                display_name: document.getElementById('editDisplayName').value,
                bio: document.getElementById('editBio').value,
                wechat_qq: document.getElementById('editWechat').value,
                phone: document.getElementById('editPhone').value,
                email: document.getElementById('editEmail').value,
                is_public: document.getElementById('editIsPublic').checked,
                custom_service_link: customServiceLink,
                custom_links: JSON.stringify(customLinks),
                custom_menu: JSON.stringify(customMenu)
            };

            // 显示保存中状态
            const saveBtn = document.querySelector('#editModal .btn-primary');
            const originalBtnText = saveBtn ? saveBtn.textContent : '保存';
            if (saveBtn) {
                saveBtn.textContent = '保存中...';
                saveBtn.disabled = true;
            }

            try {
                // 上传头像
                if (editAvatarFile) {
                    const formData = new FormData();
                    formData.append('avatar', editAvatarFile);
                    if (saveBtn) saveBtn.textContent = '上传头像中...';
                    const uploadRes = await fetch(API_BASE + '/api/marketing/avatar-upload', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token },
                        body: formData
                    });
                    const uploadData = await uploadRes.json();
                    if (uploadData.success && uploadData.data.avatar_url) {
                        data.avatar_url = uploadData.data.avatar_url;
                    }
                }

                // 上传封面
                if (editCoverFile) {
                    const formData = new FormData();
                    formData.append('cover', editCoverFile);
                    if (saveBtn) saveBtn.textContent = '上传封面中...';
                    const uploadRes = await fetch(API_BASE + '/api/marketing/cover-upload', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token },
                        body: formData
                    });
                    const uploadData = await uploadRes.json();
                    if (uploadData.success && uploadData.data.cover_image) {
                        data.cover_image = uploadData.data.cover_image;
                    }
                }

                // 保存资料
                if (saveBtn) saveBtn.textContent = '保存中...';
                const res = await fetch(API_BASE + '/api/marketing/profile', {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (result.success) {
                    alert('保存成功！');
                    profileData = result.data;
                    renderProfile();
                    closeEditModal();
                } else {
                    alert(result.error || '保存失败');
                }
            } catch (err) {
                console.error('保存失败:', err);
                alert('保存失败，请重试');
            } finally {
                // 恢复按钮状态
                if (saveBtn) {
                    saveBtn.textContent = originalBtnText;
                    saveBtn.disabled = false;
                }
            }
        }

        // 显示错误
        function showError(message) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="empty-state" style="padding: 100px 20px;">
                    <div class="empty-icon">😢</div>
                    <div class="empty-text">${message}</div>
                </div>
            `;
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
