<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>担保交易 | 能量山：零号协议</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --trade-bg: #f0f2f5;
            --trade-card-bg: rgba(255, 255, 255, 0.92);
            --trade-primary: #4a90e2;
            --trade-primary-dark: #3a7bc8;
            --trade-accent: #67c23a;
            --trade-text: #1a1a1a;
            --trade-text-secondary: #606266;
            --trade-text-light: #909399;
            --trade-border: rgba(0, 0, 0, 0.08);
            --trade-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --trade-radius: 12px;
            --trade-radius-lg: 16px;
            --trade-danger: #f56c6c;
            --trade-warning: #e6a23c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--trade-bg);
            color: var(--trade-text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--trade-border);
            padding: 0 16px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--trade-bg);
            color: var(--trade-text);
            text-decoration: none;
            font-size: 18px;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .navbar-title {
            font-size: 18px;
            font-weight: 600;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-pending { background: #e6a23c; color: white; }
        .status-submitted { background: #409eff; color: white; }
        .status-completed { background: #67c23a; color: white; }
        .status-cancelled { background: #909399; color: white; }
        .status-disputed { background: #f56c6c; color: white; }

        .countdown-timer {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            background: rgba(245, 108, 108, 0.15);
            color: #f56c6c;
        }

        .countdown-timer.warning {
            background: rgba(230, 162, 60, 0.15);
            color: #e6a23c;
        }

        .countdown-timer.normal {
            background: rgba(64, 158, 255, 0.15);
            color: #409eff;
        }

        .countdown-timer.urgent {
            background: rgba(245, 108, 108, 0.2);
            color: #f56c6c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 16px;
        }

        .trade-card {
            background: var(--trade-card-bg);
            border-radius: var(--trade-radius-lg);
            box-shadow: var(--trade-shadow);
            padding: 20px;
            margin-bottom: 16px;
        }

        .trade-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--trade-border);
        }

        .trade-no {
            font-size: 14px;
            color: var(--trade-text-light);
        }

        .trade-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .info-item {
            background: var(--trade-bg);
            padding: 12px;
            border-radius: var(--trade-radius);
        }

        .info-label {
            font-size: 12px;
            color: var(--trade-text-light);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--trade-text);
        }

        .info-value.seller { color: #f093fb; }
        .info-value.buyer { color: #f5576c; }
        .info-value.energy { color: var(--trade-primary); }
        .info-value.price { color: var(--trade-danger); }

        .qr-code-section {
            text-align: center;
            padding: 20px;
            background: var(--trade-bg);
            border-radius: var(--trade-radius);
            margin-bottom: 16px;
        }

        .qr-code-title {
            font-size: 14px;
            color: var(--trade-text-secondary);
            margin-bottom: 12px;
        }

        .qr-code-img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            border: 2px solid var(--trade-border);
        }

        .payment-section {
            margin-bottom: 16px;
        }

        .payment-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--trade-text);
        }

        .upload-area {
            border: 2px dashed var(--trade-border);
            border-radius: var(--trade-radius);
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--trade-bg);
        }

        .upload-area:hover {
            border-color: var(--trade-primary);
        }

        .upload-icon {
            font-size: 40px;
            color: var(--trade-text-light);
            margin-bottom: 8px;
        }

        .upload-text {
            font-size: 14px;
            color: var(--trade-text-light);
        }

        .payment-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: var(--trade-radius);
            display: none;
            cursor: pointer;
        }

        .payment-preview.active {
            display: block;
        }

        .chat-section {
            background: var(--trade-card-bg);
            border-radius: var(--trade-radius-lg);
            box-shadow: var(--trade-shadow);
            margin-bottom: 16px;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--trade-border);
            font-weight: 600;
        }

        .chat-messages {
            height: 300px;
            overflow-y: auto;
            padding: 16px;
            background: var(--trade-bg);
        }

        .message {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }

        .message.system {
            align-items: center;
        }

        .message.seller, .message.admin {
            align-items: flex-end;
        }

        .message.buyer {
            align-items: flex-start;
        }

        .message-content {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.system .message-content {
            background: rgba(0, 0, 0, 0.05);
            color: var(--trade-text-light);
            font-size: 12px;
            text-align: center;
            max-width: 100%;
        }

        .message.seller .message-content {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.buyer .message-content {
            background: white;
            color: var(--trade-text);
            border: 1px solid var(--trade-border);
            border-bottom-left-radius: 4px;
        }

        .message.admin .message-content {
            background: var(--trade-primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: var(--trade-text-light);
            margin-top: 4px;
        }

        .message-role {
            font-size: 11px;
            color: var(--trade-text-light);
            margin-bottom: 4px;
        }

        .message.seller .message-role {
            text-align: right;
        }

        .message.buyer .message-role {
            text-align: left;
        }

        .message.system .message-time {
            display: none;
        }

        .chat-input-section {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: white;
            border-top: 1px solid var(--trade-border);
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--trade-border);
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }

        .chat-input:focus {
            border-color: var(--trade-primary);
        }

        .chat-send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--trade-primary);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .action-btn {
            flex: 1;
            padding: 14px;
            border-radius: var(--trade-radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .btn-secondary {
            background: var(--trade-bg);
            color: var(--trade-text);
            border: 1px solid var(--trade-border);
        }

        .btn-danger {
            background: var(--trade-danger);
            color: white;
        }

        .btn-warning {
            background: var(--trade-warning);
            color: white;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: white;
            border-radius: var(--trade-radius-lg);
            width: 90%;
            max-width: 400px;
            transform: scale(0.9);
            transition: all 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--trade-border);
            font-size: 18px;
            font-weight: 600;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--trade-border);
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: var(--trade-radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            z-index: 2000;
            transition: all 0.3s;
        }

        .toast.active {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { background: var(--trade-accent); }
        .toast.error { background: var(--trade-danger); }

        .empty-chat {
            text-align: center;
            padding: 40px;
            color: var(--trade-text-light);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--trade-text-light);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <button class="back-btn" onclick="history.back()">&#8592;</button>
            <span class="navbar-title">担保交易</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <span class="countdown-timer" id="countdownTimer" style="display: none;"></span>
            <span class="status-badge" id="statusBadge">待付款</span>
        </div>
    </nav>

    <div class="container">
        <!-- 交易信息卡片 -->
        <div class="trade-card">
            <div class="trade-header">
                <span class="trade-no" id="tradeNo">交易编号: ---</span>
            </div>
            <div class="trade-info">
                <div class="info-item">
                    <div class="info-label">卖家</div>
                    <div class="info-value seller" id="sellerName">---</div>
                </div>
                <div class="info-item">
                    <div class="info-label">买家</div>
                    <div class="info-value buyer" id="buyerName">---</div>
                </div>
                <div class="info-item">
                    <div class="info-label">能量数量</div>
                    <div class="info-value energy" id="energyAmount">---</div>
                </div>
                <div class="info-item">
                    <div class="info-label">交易金额</div>
                    <div class="info-value price" id="tradePrice">---</div>
                </div>
            </div>
            
            <!-- 收款码展示区（卖家视角，买家可见） -->
            <div class="qr-code-section" id="qrCodeSection" style="display: none;">
                <div class="qr-code-title">请扫码付款给卖家</div>
                <img class="qr-code-img" id="qrCodeImg" src="" alt="收款码" onclick="showImagePreview(this.src)" style="cursor: pointer;" title="点击预览">
            </div>
            
            <!-- 付款凭证上传区（买家可见） -->
            <div class="payment-section" id="paymentSection" style="display: none;">
                <div class="payment-title">上传付款凭证</div>
                <div class="upload-area" onclick="document.getElementById('paymentInput').click()">
                    <div class="upload-icon">&#128247;</div>
                    <div class="upload-text">点击上传付款凭证</div>
                    <input type="file" id="paymentInput" accept="image/*" style="display: none;" onchange="handlePaymentUpload(this)">
                </div>
                <img class="payment-preview" id="paymentPreview" alt="付款凭证" onclick="showImagePreview(this.src)" style="cursor: pointer;" title="点击预览">
            </div>
            
            <!-- 已上传凭证展示区 -->
            <div class="payment-section" id="submittedPaymentSection" style="display: none;">
                <div class="payment-title">已上传的付款凭证</div>
                <img class="payment-preview active" id="submittedPaymentImg" alt="已上传的付款凭证" onclick="showImagePreview(this.src)" style="cursor: pointer;" title="点击预览">
                <div style="font-size: 12px; color: var(--trade-text-light); margin-top: 8px;" id="paymentTime"></div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-buttons" id="actionButtons">
            <!-- 买家操作按钮 -->
            <button class="action-btn btn-secondary" id="cancelBtn" style="display: none;" onclick="cancelTrade()">取消交易</button>
            <button class="action-btn btn-primary" id="uploadPaymentBtn" style="display: none;" onclick="showUploadPayment()">上传付款凭证</button>
            <button class="action-btn btn-warning" id="disputeBtn" style="display: none;" onclick="showDisputeModal()">发起纠纷</button>
            
            <!-- 卖家操作按钮 -->
            <button class="action-btn btn-primary" id="confirmBtn" style="display: none;" onclick="confirmPayment()">确认收款并释放能量</button>
            <button class="action-btn btn-danger" id="rejectBtn" style="display: none;" onclick="showRejectModal()">拒绝交易</button>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-section">
            <div class="chat-header">交易沟通</div>
            <div class="chat-messages" id="chatMessages">
                <div class="empty-chat">暂无消息，开始沟通吧</div>
            </div>
            <div class="chat-input-section">
                <input type="text" class="chat-input" id="chatInput" placeholder="输入消息..." onkeypress="handleChatKeypress(event)">
                <button class="chat-send-btn" onclick="sendMessage()">&#10148;</button>
            </div>
        </div>
    </div>

    <!-- 纠纷弹窗 -->
    <div class="modal-overlay" id="disputeModal">
        <div class="modal">
            <div class="modal-header">发起纠纷</div>
            <div class="modal-body">
                <div style="margin-bottom: 16px;">
                    <label style="font-size: 14px; font-weight: 500; display: block; margin-bottom: 8px;">纠纷类型</label>
                    <select id="disputeType" class="chat-input" style="width: 100%;">
                        <option value="non_payment">未收到款</option>
                        <option value="non_energy_release">未收到能量</option>
                        <option value="fake_payment">虚假付款凭证</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 14px; font-weight: 500; display: block; margin-bottom: 8px;">详细描述</label>
                    <textarea id="disputeDescription" class="chat-input" style="width: 100%; height: 100px; resize: none;" placeholder="请详细描述问题..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn btn-secondary" onclick="hideDisputeModal()">取消</button>
                <button class="modal-btn btn-danger" onclick="submitDispute()">提交纠纷</button>
            </div>
        </div>
    </div>

    <!-- 拒绝交易弹窗 -->
    <div class="modal-overlay" id="rejectModal">
        <div class="modal">
            <div class="modal-header">拒绝交易</div>
            <div class="modal-body">
                <div style="margin-bottom: 16px; color: #f56c6c; font-size: 14px;">
                    确定要拒绝此交易吗？拒绝后，买家的付款凭证将被视为无效，交易将取消，您的能量将解冻，广告将恢复上架。
                </div>
                <div>
                    <label style="font-size: 14px; font-weight: 500; display: block; margin-bottom: 8px;">拒绝原因</label>
                    <textarea id="rejectReason" class="chat-input" style="width: 100%; height: 100px; resize: none;" placeholder="请说明拒绝原因（如：付款凭证图片模糊、金额不符等）"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn btn-secondary" onclick="hideRejectModal()">取消</button>
                <button class="modal-btn btn-danger" onclick="submitReject()">确认拒绝</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- 图片预览模态框 -->
    <div id="imagePreviewModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center;" onclick="closeImagePreview(event)">
        <img id="previewImage" style="max-width: 90%; max-height: 90%; border-radius: 8px; cursor: pointer;" onclick="downloadImage()">
        <div style="position: absolute; top: 20px; right: 20px; display: flex; gap: 10px;">
            <button onclick="downloadImage()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px;">&#128229; 下载</button>
            <button onclick="document.getElementById('imagePreviewModal').style.display='none'" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px;">&#10005; 关闭</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="/js/auth-manager.js"></script>
    <script>
        const API_BASE = window.location.origin;
        let token = AuthManager.getToken();
        let tradeId = 0;
        let tradeNo = '';
        let userId = 0;
        let role = ''; // 'seller' or 'buyer'
        let socket = null;
        let paymentImageUrl = '';
        let currentTrade = null;

        function init() {
            const params = new URLSearchParams(window.location.search);
            tradeId = parseInt(params.get('trade_id'));
            tradeNo = params.get('trade_no');

            if (!token) {
                showToast('请先登录', 'error');
                setTimeout(() => window.location.href = 'game.html', 1500);
                return;
            }

            if (!tradeId || !tradeNo) {
                showToast('参数错误', 'error');
                setTimeout(() => history.back(), 1500);
                return;
            }

            document.getElementById('tradeNo').textContent = '交易编号: ' + tradeNo;
            loadTradeInfo();
        }

        async function loadTradeInfo() {
            try {
                const response = await fetch(`${API_BASE}/api/energy-trade/trades/${tradeId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                // 检查令牌是否过期
                const isExpired = await checkTokenExpiry(response);
                if (isExpired) return;

                const result = await response.json();

                if (result.success) {
                    currentTrade = result.data;
                    renderTradeInfo(result.data);
                    connectSocket();
                    loadChatMessages();
                } else {
                    showToast(result.error || '加载失败', 'error');
                }
            } catch (err) {
                showToast('网络错误', 'error');
            }
        }

        function renderTradeInfo(trade) {
            document.getElementById('sellerName').textContent = trade.seller_username;
            document.getElementById('buyerName').textContent = trade.buyer_username;
            document.getElementById('energyAmount').textContent = trade.energy_amount + ' 能量';
            document.getElementById('tradePrice').textContent = '¥' + parseFloat(trade.price).toFixed(2);

            // 更新状态标签
            const statusBadge = document.getElementById('statusBadge');
            const statusMap = {
                'pending_payment': { text: '待付款', class: 'status-pending' },
                'payment_submitted': { text: '待确认', class: 'status-submitted' },
                'energy_released': { text: '已完成', class: 'status-completed' },
                'cancelled': { text: '已取消', class: 'status-cancelled' },
                'disputed': { text: '纠纷中', class: 'status-disputed' }
            };
            const statusInfo = statusMap[trade.status] || { text: trade.status, class: 'status-pending' };
            statusBadge.textContent = statusInfo.text;
            statusBadge.className = 'status-badge ' + statusInfo.class;

            // 初始化倒计时
            if (trade.remaining_seconds && trade.remaining_seconds > 0) {
                updateCountdown(trade.remaining_seconds, trade.status);
            } else {
                // 清除倒计时
                const timerEl = document.getElementById('countdownTimer');
                if (timerEl) timerEl.style.display = 'none';
            }

            // 获取当前用户ID（从token解析）
            const payload = JSON.parse(atob(token.split('.')[1]));
            userId = payload.userId;

            // 判断用户角色
            role = userId === trade.seller_id ? 'seller' : 'buyer';

            // 根据角色和状态显示不同内容
            const qrCodeSection = document.getElementById('qrCodeSection');
            const paymentSection = document.getElementById('paymentSection');
            const submittedPaymentSection = document.getElementById('submittedPaymentSection');
            const uploadPaymentBtn = document.getElementById('uploadPaymentBtn');
            const cancelBtn = document.getElementById('cancelBtn');
            const confirmBtn = document.getElementById('confirmBtn');
            const rejectBtn = document.getElementById('rejectBtn');
            const disputeBtn = document.getElementById('disputeBtn');

            // 买家可见收款码
            if (role === 'buyer' && trade.status === 'pending_payment') {
                qrCodeSection.style.display = 'block';
                if (trade.ad && trade.ad.payment_qr_code) {
                    document.getElementById('qrCodeImg').src = trade.ad.payment_qr_code;
                }
            }

            // 买家上传付款凭证
            if (role === 'buyer' && trade.status === 'pending_payment') {
                paymentSection.style.display = 'block';
                uploadPaymentBtn.style.display = 'block';
                cancelBtn.style.display = 'block';
            }

            // 显示已上传的凭证
            if (trade.payment_image) {
                qrCodeSection.style.display = 'none';
                paymentSection.style.display = 'none';
                submittedPaymentSection.style.display = 'block';
                document.getElementById('submittedPaymentImg').src = trade.payment_image;
                if (trade.payment_time) {
                    document.getElementById('paymentTime').textContent = '上传时间: ' + formatTime(trade.payment_time);
                }
            }

            // 卖家确认收款
            if (role === 'seller' && trade.status === 'payment_submitted') {
                confirmBtn.style.display = 'block';
                rejectBtn.style.display = 'block';
                submittedPaymentSection.style.display = 'block';
                document.getElementById('submittedPaymentImg').src = trade.payment_image;
                if (trade.payment_time) {
                    document.getElementById('paymentTime').textContent = '付款时间: ' + formatTime(trade.payment_time);
                }
            }

            // 纠纷按钮（买家可在特定状态发起）
            if (role === 'buyer' && ['pending_payment', 'payment_submitted'].includes(trade.status)) {
                disputeBtn.style.display = 'block';
            }
        }

        let messageIds = new Set(); // 用于消息去重

        function connectSocket() {
            // 如果已存在连接，先移除旧监听器再创建新的
            if (socket) {
                socket.off('connect');
                socket.off('new_message');
                socket.off('trade_update');
                socket.off('trade_countdown');
                socket.off('disconnect');
                socket.disconnect();
            }

            socket = io(API_BASE + '/energy-trade', {
                auth: { token: token }
            });

            socket.on('connect', () => {
                console.log('Socket connected');
                socket.emit('join_trade_room', { tradeId: tradeId, tradeNo: tradeNo });
            });

            socket.on('joined_room', (data) => {
                console.log('Joined room:', data.tradeNo);
                loadChatMessages();
            });

            socket.on('new_message', (message) => {
                // 消息去重：检查消息ID或tempId是否已存在
                if (message.id && messageIds.has(message.id)) {
                    return;
                }
                if (message.tempId) {
                    // 自己的消息已经在本地显示了，需要通过tempId去重
                    const tempMsg = document.querySelector(`[data-temp-id="${message.tempId}"]`);
                    if (tempMsg) {
                        // 替换临时消息为真实消息
                        tempMsg.remove();
                    }
                }
                if (message.id) {
                    messageIds.add(message.id);
                }
                appendMessage(message);
            });

            socket.on('trade_update', (data) => {
                // 兼容 trade_id 和 trade_no 两种匹配方式
                if (data.trade_id === tradeId || data.trade_no === tradeNo) {
                    loadTradeInfo();
                }
            });

            // 监听倒计时更新
            socket.on('trade_countdown', (data) => {
                // 兼容 trade_id 和 trade_no 两种匹配方式
                if (data.trade_id === tradeId || data.trade_no === tradeNo) {
                    updateCountdown(data.remaining_seconds, data.status);
                }
            });

            socket.on('error', (data) => {
                console.error('Socket error:', data);
                showToast(data.message || '发生错误', 'error');
                // 显示详细错误用于调试
                console.log('详细错误:', JSON.stringify(data));
            });

            socket.on('disconnect', () => {
                console.log('Socket disconnected');
            });
        }

        async function loadChatMessages() {
            try {
                const response = await fetch(`${API_BASE}/api/energy-trade/trades/${tradeId}/chat`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const result = await response.json();

                if (result.success) {
                    renderMessages(result.data);
                }
            } catch (err) {
                console.error('加载消息失败:', err);
            }
        }

        function renderMessages(messages) {
            const chatMessages = document.getElementById('chatMessages');

            if (!messages || messages.length === 0) {
                chatMessages.innerHTML = '<div class="empty-chat">暂无消息，开始沟通吧</div>';
                return;
            }

            chatMessages.innerHTML = messages.map(msg => {
                const roleClass = msg.sender_role;
                const roleLabel = roleClass === 'seller' ? '卖家' : roleClass === 'buyer' ? '买家' : '系统';
                return `
                    <div class="message ${roleClass}">
                        <div class="message-role">${roleLabel}</div>
                        <div class="message-content">${escapeHtml(msg.content)}</div>
                        <div class="message-time">${formatTime(msg.created_at)}</div>
                    </div>
                `;
            }).join('');

            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function appendMessage(message) {
            const chatMessages = document.getElementById('chatMessages');
            const emptyChat = chatMessages.querySelector('.empty-chat');
            if (emptyChat) emptyChat.remove();

            const roleClass = message.sender_role;
            const roleLabel = roleClass === 'seller' ? '卖家' : roleClass === 'buyer' ? '买家' : '系统';
            const html = `
                <div class="message ${roleClass}">
                    <div class="message-role">${roleLabel}</div>
                    <div class="message-content">${escapeHtml(message.content)}</div>
                    <div class="message-time">${formatTime(message.created_at)}</div>
                </div>
            `;

            chatMessages.insertAdjacentHTML('beforeend', html);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const content = input.value.trim();
            
            if (!content) return;

            // 生成临时消息ID用于去重
            const tempId = 'temp_' + Date.now();

            // 立即显示到本地界面（乐观更新）
            const chatMessages = document.getElementById('chatMessages');
            const emptyChat = chatMessages.querySelector('.empty-chat');
            if (emptyChat) emptyChat.remove();

            const roleClass = role; // 使用全局变量 role
            const roleLabel = roleClass === 'seller' ? '卖家' : roleClass === 'buyer' ? '买家' : '系统';
            const html = `
                <div class="message ${roleClass}" data-temp-id="${tempId}">
                    <div class="message-role">${roleLabel}</div>
                    <div class="message-content">${escapeHtml(content)}</div>
                    <div class="message-time">刚刚</div>
                </div>
            `;
            chatMessages.insertAdjacentHTML('beforeend', html);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            input.value = '';

            // 通过Socket发送
            if (socket && socket.connected) {
                console.log('Sending message via socket:', { tradeId, tradeNo, content });
                socket.emit('send_message', { tradeId: tradeId, tradeNo: tradeNo, content: content, tempId: tempId });
            } else {
                // HTTP降级
                try {
                    await fetch(`${API_BASE}/api/energy-trade/trades/${tradeId}/chat`, {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + token,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ content: content })
                    });
                    loadChatMessages();
                } catch (err) {
                    showToast('发送失败', 'error');
                    // 移除本地显示的消息
                    const tempMsg = chatMessages.querySelector(`[data-temp-id="${tempId}"]`);
                    if (tempMsg) tempMsg.remove();
                }
            }
        }

        function handleChatKeypress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function showUploadPayment() {
            document.getElementById('paymentInput').click();
        }

        async function handlePaymentUpload(input) {
            if (!input.files || !input.files[0]) return;

            const file = input.files[0];
            const formData = new FormData();
            formData.append('payment_image', file);

            showToast('上传中...', '');

            try {
                const response = await fetch(`${API_BASE}/api/energy-trade/trades/${tradeId}/payment`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token },
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    showToast('付款凭证上传成功', 'success');
                    loadTradeInfo();
                } else {
                    showToast(result.error || '上传失败', 'error');
                }
            } catch (err) {
                showToast('上传失败', 'error');
            }
        }

        async function confirmPayment() {
            if (!confirm('请确认已收到买家付款，确认后能量将释放给买家')) return;

            try {
                const response = await fetch(`${API_BASE}/api/energy-trade/trades/${tradeId}/confirm`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const result = await response.json();

                if (result.success) {
                    showToast('确认成功，' + result.message, 'success');
                    loadTradeInfo();
                } else {
                    showToast(result.error || '确认失败', 'error');
                }
            } catch (err) {
                showToast('网络错误', 'error');
            }
        }

        function showRejectModal() {
            document.getElementById('rejectModal').classList.add('active');
        }

        function hideRejectModal() {
            document.getElementById('rejectModal').classList.remove('active');
            document.getElementById('rejectReason').value = '';
        }

        async function submitReject() {
            const reason = document.getElementById('rejectReason').value;

            if (!reason) {
                showToast('请填写拒绝原因', 'error');
                return;
            }

            if (!confirm('确定要拒绝此交易吗？拒绝后交易将取消，您的能量将解冻，广告将恢复上架。')) return;

            try {
                const response = await fetch(`${API_BASE}/api/energy-trade/trades/${tradeId}/reject`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ reason: reason })
                });
                const result = await response.json();

                if (result.success) {
                    showToast('已拒绝交易', 'success');
                    hideRejectModal();
                    loadTradeInfo();
                } else {
                    showToast(result.error || '操作失败', 'error');
                }
            } catch (err) {
                showToast('网络错误', 'error');
            }
        }

        async function cancelTrade() {
            const reason = prompt('请输入取消原因（可选）:');
            
            try {
                const response = await fetch(`${API_BASE}/api/energy-trade/trades/${tradeId}/cancel`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ reason: reason || '' })
                });
                const result = await response.json();

                if (result.success) {
                    showToast('交易已取消', 'success');
                    loadTradeInfo();
                } else {
                    showToast(result.error || '取消失败', 'error');
                }
            } catch (err) {
                showToast('网络错误', 'error');
            }
        }

        function showDisputeModal() {
            document.getElementById('disputeModal').classList.add('active');
        }

        function hideDisputeModal() {
            document.getElementById('disputeModal').classList.remove('active');
        }

        async function submitDispute() {
            const disputeType = document.getElementById('disputeType').value;
            const description = document.getElementById('disputeDescription').value;

            if (!description) {
                showToast('请填写详细描述', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/energy-trade/trades/${tradeId}/dispute`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ dispute_type: disputeType, description: description })
                });
                const result = await response.json();

                if (result.success) {
                    showToast('纠纷已提交', 'success');
                    hideDisputeModal();
                    loadTradeInfo();
                } else {
                    showToast(result.error || '提交失败', 'error');
                }
            } catch (err) {
                showToast('网络错误', 'error');
            }
        }

        // 倒计时相关变量
        let countdownInterval = null;

        function updateCountdown(remainingSeconds, status) {
            const timerEl = document.getElementById('countdownTimer');
            if (!timerEl) return;

            // 清除之前的定时器
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }

            // 如果没有剩余时间，隐藏倒计时
            if (remainingSeconds <= 0 || !status) {
                timerEl.style.display = 'none';
                return;
            }

            timerEl.style.display = 'flex';

            // 根据状态显示不同提示
            let prefix = '';
            if (status === 'pending_payment') {
                prefix = '付款剩余: ';
            } else if (status === 'payment_submitted') {
                prefix = '确认剩余: ';
            }

            // 更新倒计时显示
            function updateDisplay() {
                remainingSeconds--;
                if (remainingSeconds <= 0) {
                    timerEl.style.display = 'none';
                    clearInterval(countdownInterval);
                    // 交易可能已超时，刷新交易信息
                    loadTradeInfo();
                    return;
                }

                const minutes = Math.floor(remainingSeconds / 60);
                const seconds = remainingSeconds % 60;
                const timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                timerEl.textContent = prefix + timeStr;

                // 根据剩余时间设置样式
                timerEl.className = 'countdown-timer';
                if (remainingSeconds <= 30) {
                    timerEl.classList.add('urgent');
                } else if (remainingSeconds <= 60) {
                    timerEl.classList.add('warning');
                } else {
                    timerEl.classList.add('normal');
                }
            }

            // 立即更新一次
            updateDisplay();
            // 每秒更新一次
            countdownInterval = setInterval(updateDisplay, 1000);
        }

        function formatTime(time) {
            if (!time) return '';
            const date = new Date(time);
            return date.toLocaleString('zh-CN');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 图片预览功能
        function showImagePreview(src) {
            document.getElementById('previewImage').src = src;
            document.getElementById('imagePreviewModal').style.display = 'flex';
        }

        function closeImagePreview(event) {
            if (event.target.id === 'imagePreviewModal') {
                document.getElementById('imagePreviewModal').style.display = 'none';
            }
        }

        function downloadImage() {
            const img = document.getElementById('previewImage');
            const link = document.createElement('a');
            link.href = img.src;
            link.download = 'image_' + Date.now() + '.jpg';
            link.click();
        }

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast active ' + type;
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        // 检查token是否过期
        function checkTokenExpiry(response) {
            if (response.status === 403 || response.status === 401) {
                return response.clone().json().then(result => {
                    if (result.error && (result.error.includes('无效') || result.error.includes('过期') || result.error.includes('token'))) {
                        alert('登录状态已过期，请重新登录');
                        localStorage.removeItem('authToken');
                        window.location.href = 'game.html';
                        return true;
                    }
                    return false;
                }).catch(() => false);
            }
            return Promise.resolve(false);
        }

        init();
    </script>
