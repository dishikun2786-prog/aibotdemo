<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注册 | 能量山：零号协议</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 28px;
            color: #e91e63;
            margin-bottom: 5px;
            font-family: 'Orbitron', sans-serif;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e91e63;
        }

        .form-group .hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .captcha-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .captcha-group input {
            flex: 1;
        }

        .captcha-img {
            height: 48px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
        }

        .captcha-error {
            color: #e91e63;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e91e63, #9c27b0);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: #e91e63;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .referrer-info {
            background: #e8f5e9;
            border: 1px solid #4caf50;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .referrer-info.show {
            display: block;
        }

        .referrer-info .title {
            color: #2e7d32;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .referrer-info .username {
            color: #1b5e20;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="register-box">
        <div class="logo">
            <h1>能量山</h1>
            <p>零号协议 - 注册</p>
        </div>

        <div class="error" id="error"></div>

        <!-- 推荐人信息提示 -->
        <div class="referrer-info" id="referrerInfo">
            <div class="title">
                <span>✓</span> 您正在通过推广链接注册
            </div>
            <div class="username" id="referrerName">推荐人：---</div>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="用户名 (3-20字符)" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="密码 (至少6字符)" autocomplete="new-password" required>
                <div class="hint">建议使用字母、数字组合</div>
            </div>

            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="confirmPassword" placeholder="确认密码" autocomplete="new-password" required>
            </div>

            <div class="form-group">
                <label>激活码 <span style="color: #e91e63;">(必填)</span></label>
                <input type="text" id="activationCode" placeholder="请输入激活码" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label>验证码</label>
                <div class="captcha-group">
                    <input type="text" id="captcha" placeholder="验证码" maxlength="4" required>
                    <img class="captcha-img" id="captchaImg" src="" alt="验证码" onclick="refreshCaptcha()">
                </div>
                <div class="captcha-error" id="captchaError"></div>
            </div>

            <input type="hidden" id="captchaId">
            <input type="hidden" id="referrerCode" value="">

            <button type="submit" class="btn">创建账户</button>
        </form>

        <div class="links">
            已有账号？<a href="login.html">立即登录</a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', async () => {
            // 检查URL中的推荐码
            const urlParams = new URLSearchParams(window.location.search);
            const referrerCode = urlParams.get('code');

            if (referrerCode) {
                document.getElementById('referrerCode').value = referrerCode;
                // 尝试获取推荐人信息
                await checkReferrer(referrerCode);
            }

            // 加载验证码
            refreshCaptcha();
        });

        // 检查推荐人
        async function checkReferrer(code) {
            try {
                const response = await fetch(`${API_BASE}/api/auth/check-referrer?code=${code}`);
                const data = await response.json();

                if (data.success && data.data.exists) {
                    const referrerInfo = document.getElementById('referrerInfo');
                    const referrerName = document.getElementById('referrerName');
                    referrerInfo.classList.add('show');
                    referrerName.textContent = `推荐人：${data.data.username}`;
                }
            } catch (err) {
                console.error('检查推荐人失败:', err);
            }
        }

        // 刷新验证码
        async function refreshCaptcha() {
            try {
                const response = await fetch(`${API_BASE}/api/auth/captcha?t=${Date.now()}`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('captchaImg').src = data.image;
                    document.getElementById('captchaId').value = data.captchaId;
                }
            } catch (error) {
                console.error('获取验证码失败:', error);
                showError('无法连接到服务器，请确保后端服务器已启动');
            }
        }

        // 显示错误
        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        // 隐藏错误
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        // 表单提交
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const activationCode = document.getElementById('activationCode').value.trim();
            const captchaId = document.getElementById('captchaId').value;
            const captchaCode = document.getElementById('captcha').value.trim();
            const referrerCode = document.getElementById('referrerCode').value;

            // 验证
            if (!username || !password || !confirmPassword || !activationCode || !captchaCode) {
                showError('请填写所有必填项');
                return;
            }

            if (username.length < 3 || username.length > 20) {
                showError('用户名长度必须在3-20个字符之间');
                return;
            }

            if (password.length < 6) {
                showError('密码长度至少6个字符');
                return;
            }

            if (password !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        password,
                        confirmPassword,
                        activationCode,
                        captchaId,
                        captchaCode,
                        referrer_code: referrerCode
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // 保存token
                    localStorage.setItem('authToken', data.token);

                    // 注册成功，根据用户角色跳转
                    const isAdmin = data.user && data.user.is_admin;
                    alert('注册成功！正在进入游戏...');
                    window.location.href = isAdmin ? 'admin.html' : 'game.html';
                } else {
                    showError(data.error || '注册失败');
                    refreshCaptcha();
                }
            } catch (error) {
                console.error('注册错误:', error);
                showError('注册失败，请稍后重试');
                refreshCaptcha();
            }
        });
    </script>
    <script src="/js/auth-manager.js"></script>
    <script src="/js/visitor-tracker.js"></script>
</body>
</html>
