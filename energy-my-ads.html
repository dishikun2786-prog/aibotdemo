<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的广告 | 能量山：零号协议</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --trade-bg: #f0f2f5;
            --trade-card-bg: rgba(255, 255, 255, 0.92);
            --trade-primary: #4a90e2;
            --trade-accent: #67c23a;
            --trade-text: #1a1a1a;
            --trade-text-secondary: #606266;
            --trade-text-light: #909399;
            --trade-border: rgba(0, 0, 0, 0.08);
            --trade-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --trade-radius: 12px;
            --trade-radius-lg: 16px;
            --trade-danger: #f56c6c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--trade-bg);
            color: var(--trade-text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--trade-border);
            padding: 0 16px;
            height: 56px;
            display: flex;
            align-items: center;
        }

        .navbar-left { display: flex; align-items: center; gap: 12px; }

        .back-btn {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--trade-bg); border: none; font-size: 18px; cursor: pointer;
        }

        .navbar-title { font-size: 18px; font-weight: 600; }

        .container { max-width: 720px; margin: 0 auto; padding: 16px; }

        .ad-card {
            background: var(--trade-card-bg);
            border-radius: var(--trade-radius-lg);
            box-shadow: var(--trade-shadow);
            padding: 16px;
            margin-bottom: 12px;
        }

        .ad-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }

        .ad-status {
            padding: 4px 10px; border-radius: 10px; font-size: 12px; font-weight: 500;
        }

        .status-active { background: #67c23a; color: white; }
        .status-sold { background: #409eff; color: white; }
        .status-cancelled { background: #909399; color: white; }
        .status-expired { background: #e6a23c; color: white; }

        .ad-info {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;
        }

        .info-item { background: var(--trade-bg); padding: 10px; border-radius: var(--trade-radius); }

        .info-label { font-size: 12px; color: var(--trade-text-light); margin-bottom: 4px; }

        .info-value { font-size: 16px; font-weight: 600; }
        .info-value.energy { color: var(--trade-primary); }
        .info-value.price { color: var(--trade-danger); }

        .ad-time { font-size: 12px; color: var(--trade-text-light); }

        .action-buttons { display: flex; gap: 8px; margin-top: 12px; }

        .action-btn {
            flex: 1; padding: 10px; border-radius: var(--trade-radius);
            font-size: 14px; font-weight: 500; cursor: pointer; border: none;
        }

        .btn-secondary { background: var(--trade-bg); border: 1px solid var(--trade-border); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--trade-text-light); }
        .empty-icon { font-size: 64px; margin-bottom: 16px; }
        .loading { text-align: center; padding: 40px 20px; color: var(--trade-text-light); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <button class="back-btn" onclick="history.back()">&#8592;</button>
            <span class="navbar-title">我的广告</span>
        </div>
    </nav>

    <div class="container">
        <div id="adList"></div>
        <div id="loading" class="loading">加载中...</div>
        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">&#128227;</div>
            <div>您还没有发布过广告</div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let token = AuthManager.getToken();

        function init() {
            if (!token) {
                alert('请先登录');
                window.location.href = 'game.html';
                return;
            }
            loadMyAds();
        }

        async function loadMyAds() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('adList').innerHTML = '';
            document.getElementById('emptyState').style.display = 'none';

            try {
                const response = await fetch(API_BASE + '/api/energy-trade/ads/my', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const result = await response.json();

                document.getElementById('loading').style.display = 'none';

                if (result.success) {
                    renderAds(result.data.list);
                } else {
                    alert(result.error || '加载失败');
                }
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                alert('网络错误');
            }
        }

        function renderAds(ads) {
            if (!ads || ads.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                return;
            }

            const html = ads.map(ad => {
                const statusMap = {
                    'active': { text: '进行中', class: 'status-active' },
                    'sold': { text: '已售出', class: 'status-sold' },
                    'cancelled': { text: '已取消', class: 'status-cancelled' },
                    'expired': { text: '已过期', class: 'status-expired' }
                };
                const statusInfo = statusMap[ad.status] || { text: ad.status, class: 'status-active' };

                return '<div class="ad-card">' +
                    '<div class="ad-header">' +
                        '<span class="ad-status ' + statusInfo.class + '">' + statusInfo.text + '</span>' +
                        '<span class="ad-time">' + formatTime(ad.created_at) + '</span>' +
                    '</div>' +
                    '<div class="ad-info">' +
                        '<div class="info-item"><div class="info-label">能量数量</div><div class="info-value energy">' + ad.energy_amount + '</div></div>' +
                        '<div class="info-item"><div class="info-label">总价</div><div class="info-value price">¥' + parseFloat(ad.total_price).toFixed(2) + '</div></div>' +
                        '<div class="info-item"><div class="info-label">单价</div><div class="info-value">¥' + parseFloat(ad.price_per_energy).toFixed(2) + '/能量</div></div>' +
                        '<div class="info-item"><div class="info-label">浏览量</div><div class="info-value">' + ad.view_count + '</div></div>' +
                    '</div>' +
                    (ad.status === 'active' ? '<div class="action-buttons"><button class="action-btn btn-secondary" onclick="deleteAd(' + ad.id + ')">删除广告</button></div>' : '') +
                '</div>';
            }).join('');

            document.getElementById('adList').innerHTML = html;
        }

        async function deleteAd(adId) {
            if (!confirm('确定要删除此广告吗？删除后冻结的能量将被解冻。')) return;

            try {
                const response = await fetch(API_BASE + '/api/energy-trade/ads/' + adId, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const result = await response.json();

                if (result.success) {
                    alert('删除成功');
                    loadMyAds();
                } else {
                    alert(result.error || '删除失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }

        function formatTime(time) {
            const date = new Date(time);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
            return date.toLocaleDateString('zh-CN');
        }

        // XSS防护函数
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        init();
    </script>
    <script src="/js/auth-manager.js"></script>
    <script src="/js/visitor-tracker.js"></script>
</body>
</html>
