<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>玩家广场 | 能量山：零号协议</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --plaza-bg: #f0f2f5;
            --plaza-card-bg: rgba(255, 255, 255, 0.92);
            --plaza-primary: #4a90e2;
            --plaza-primary-dark: #3a7bc8;
            --plaza-accent: #67c23a;
            --plaza-text: #1a1a1a;
            --plaza-text-secondary: #606266;
            --plaza-text-light: #909399;
            --plaza-border: rgba(0, 0, 0, 0.08);
            --plaza-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --plaza-shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.12);
            --plaza-radius: 12px;
            --plaza-radius-lg: 16px;
            --plaza-radius-sm: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--plaza-bg);
            color: var(--plaza-text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 280px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #a18cd1 100%);
            z-index: 0;
        }

        /* 顶部导航 */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--plaza-border);
            padding: 0 16px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--plaza-bg);
            color: var(--plaza-text);
            text-decoration: none;
            font-size: 18px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #e8e8e8;
        }

        .navbar-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--plaza-text);
        }

        .nav-icon-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--plaza-bg);
            color: var(--plaza-text);
            text-decoration: none;
            font-size: 16px;
            transition: all 0.2s;
        }

        .nav-icon-link:hover {
            background: #e91e63;
            color: white;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .online-count {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--plaza-text-light);
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--plaza-accent);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--plaza-primary), #a18cd1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        /* 主容器 */
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 16px 80px;
            position: relative;
            z-index: 1;
        }

        /* 搜索栏 */
        .search-bar {
            margin-bottom: 20px;
        }

        .search-input-wrapper {
            position: relative;
            background: var(--plaza-card-bg);
            border-radius: 24px;
            box-shadow: var(--plaza-shadow);
            overflow: hidden;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            border: none;
            background: transparent;
            font-size: 15px;
            color: var(--plaza-text);
            outline: none;
        }

        .search-input::placeholder {
            color: var(--plaza-text-light);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--plaza-text-light);
            font-size: 16px;
        }

        /* 发布按钮 */
        .fab {
            position: fixed;
            bottom: 84px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--plaza-primary), #764ba2);
            color: white;
            border: none;
            box-shadow: 0 4px 20px rgba(74, 144, 226, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 90;
        }

        .fab:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 28px rgba(74, 144, 226, 0.5);
        }

        .fab:active {
            transform: scale(0.95);
        }

        /* 帖子卡片 */
        .post-card {
            background: var(--plaza-card-bg);
            border-radius: var(--plaza-radius-lg);
            box-shadow: var(--plaza-shadow);
            padding: 20px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .post-card:hover {
            box-shadow: var(--plaza-shadow-hover);
            transform: translateY(-2px);
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .post-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #a18cd1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: 500;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .post-info {
            flex: 1;
            min-width: 0;
        }

        .post-author {
            font-size: 15px;
            font-weight: 600;
            color: var(--plaza-text);
            margin-bottom: 2px;
        }

        .post-time {
            font-size: 12px;
            color: var(--plaza-text-light);
        }

        /* 用户数据小标签 */
        .post-author-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }

        .user-stats-mini {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
        }

        .stat-item {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 500;
        }

        .stat-item.energy {
            background: rgba(255, 193, 7, 0.15);
            color: #ff9800;
        }

        .stat-item.contribution {
            background: rgba(156, 39, 176, 0.15);
            color: #9c27b0;
        }

        .stat-item.fortune {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
        }

        .stat-icon {
            font-size: 10px;
        }

        .post-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--plaza-text);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .post-content {
            font-size: 14px;
            color: var(--plaza-text-secondary);
            line-height: 1.7;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-images {
            display: grid;
            gap: 8px;
            margin-bottom: 14px;
        }

        .post-images.grid-1 { grid-template-columns: 1fr; }
        .post-images.grid-2 { grid-template-columns: repeat(2, 1fr); }
        .post-images.grid-3 { grid-template-columns: repeat(3, 1fr); }

        .post-image {
            width: 100%;
            aspect-ratio: 16/10;
            object-fit: cover;
            border-radius: var(--plaza-radius-sm);
            background: var(--plaza-bg);
        }

        .post-images.grid-1 .post-image {
            aspect-ratio: 16/9;
            max-height: 240px;
        }

        .post-images.grid-2 .post-image,
        .post-images.grid-3 .post-image {
            aspect-ratio: 1;
        }

        .post-stats {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-top: 12px;
            border-top: 1px solid var(--plaza-border);
        }

        .post-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--plaza-text-light);
            cursor: pointer;
            transition: color 0.2s;
        }

        .post-stat:hover {
            color: var(--plaza-primary);
        }

        .post-stat.liked {
            color: #e74c3c;
        }

        .post-stat-icon {
            font-size: 16px;
        }

        /* 加载更多 */
        .load-more {
            text-align: center;
            padding: 30px;
            color: var(--plaza-text-light);
            font-size: 14px;
        }

        .load-more.loading::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-left: 8px;
            border: 2px solid var(--plaza-border);
            border-top-color: var(--plaza-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--plaza-text-light);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 15px;
        }

        /* 发布弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            background: var(--plaza-card-bg);
            border-radius: var(--plaza-radius-lg) var(--plaza-radius-lg) 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--plaza-border);
            flex-shrink: 0;
        }

        .modal-title {
            font-size: 17px;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--plaza-bg);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--plaza-text-light);
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #e8e8e8;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--plaza-text);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--plaza-border);
            border-radius: var(--plaza-radius-sm);
            font-size: 15px;
            color: var(--plaza-text);
            background: white;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--plaza-primary);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .form-textarea {
            min-height: 150px;
            resize: vertical;
            line-height: 1.6;
        }

        .form-hint {
            font-size: 12px;
            color: var(--plaza-text-light);
            margin-top: 6px;
        }

        /* 验证码 */
        .captcha-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .captcha-input {
            flex: 1;
        }

        .captcha-image {
            width: 120px;
            height: 40px;
            border-radius: var(--plaza-radius-sm);
            cursor: pointer;
            border: 1px solid var(--plaza-border);
        }

        .captcha-refresh {
            font-size: 12px;
            color: var(--plaza-primary);
            cursor: pointer;
            text-align: center;
            margin-top: 4px;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--plaza-border);
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }

        .btn {
            flex: 1;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-secondary {
            background: var(--plaza-bg);
            color: var(--plaza-text-secondary);
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--plaza-primary), #764ba2);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 详情页 */
        .detail-page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--plaza-bg);
            z-index: 150;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .detail-page.active {
            transform: translateX(0);
        }

        .detail-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: var(--plaza-card-bg);
            border-bottom: 1px solid var(--plaza-border);
        }

        .detail-back {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--plaza-bg);
            color: var(--plaza-text);
            border: none;
            font-size: 18px;
            cursor: pointer;
            margin-right: 12px;
        }

        .detail-title {
            font-size: 16px;
            font-weight: 600;
            flex: 1;
            text-align: center;
            margin-right: 48px;
        }

        .detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 100px;
        }

        .detail-post {
            background: var(--plaza-card-bg);
            border-radius: var(--plaza-radius-lg);
            padding: 20px;
            margin-bottom: 20px;
        }

        .detail-post-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .detail-post-content {
            font-size: 15px;
            line-height: 1.8;
            color: var(--plaza-text-secondary);
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* 评论区域 */
        .comments-section {
            background: var(--plaza-card-bg);
            border-radius: var(--plaza-radius-lg);
            padding: 20px;
        }

        .comments-header {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--plaza-border);
        }

        .comment-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--plaza-border);
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-item.pending {
            opacity: 0.7;
        }

        .comment-item.pending .comment-content {
            font-style: italic;
        }

        .comment-pending {
            color: #999;
            font-size: 0.8em;
            margin-left: 4px;
        }

        .comment-item.nested {
            margin-left: 40px;
            padding-left: 12px;
            border-left: 2px solid var(--plaza-border);
        }

        .comment-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #a18cd1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            font-weight: 500;
            margin-right: 10px;
        }

        .comment-author {
            font-size: 14px;
            font-weight: 600;
            color: var(--plaza-text);
        }

        .comment-time {
            font-size: 12px;
            color: var(--plaza-text-light);
            margin-left: 8px;
        }

        .comment-reply-to {
            font-size: 12px;
            color: var(--plaza-primary);
            margin-left: 8px;
        }

        .comment-reply-to strong {
            font-weight: 500;
        }

        .comment-content {
            font-size: 14px;
            color: var(--plaza-text-secondary);
            line-height: 1.6;
            margin-left: 42px;
        }

        .comment-actions {
            display: flex;
            gap: 16px;
            margin-left: 42px;
            margin-top: 8px;
            margin-bottom: 12px;
        }

        .comment-action {
            font-size: 12px;
            color: var(--plaza-text-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .comment-action:hover {
            color: var(--plaza-primary);
        }

        .comment-action.liked {
            color: #e74c3c;
        }

        /* 评论输入框 */
        .comment-input-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--plaza-card-bg);
            border-top: 1px solid var(--plaza-border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .comment-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--plaza-border);
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            background: var(--plaza-bg);
        }

        .comment-input:focus {
            border-color: var(--plaza-primary);
        }

        .comment-submit {
            padding: 8px 16px;
            background: var(--plaza-primary);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }

        /* 通知 */
        .notification {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--plaza-card-bg);
            padding: 14px 20px;
            border-radius: var(--plaza-radius);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            z-index: 300;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 90%;
        }

        .notification.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .notification-icon {
            font-size: 20px;
        }

        .notification-text {
            font-size: 14px;
            color: var(--plaza-text);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            z-index: 400;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* 图片预览 */
        .image-preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .image-preview-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .image-preview-img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
        }

        .image-preview-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;

                            <input type="range" id="creatorAssassinInput" min="1" max="100" value="50" style="width: 100%; accent-color: #9c27b0;" oninput="document.getElementById('creatorAssassinValue').textContent = this.value">

    <!-- 通知 -->

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="/js/auth-manager.js"></script>
    <script>
        // 全局配置
        const API_BASE = window.location.origin;
        let currentUser = null;
        let currentPostId = null;
        let currentPage = 1;
        let isLoading = false;
        let searchKeyword = '';
        let captchaId = '';
        let replyingTo = null; // 当前回复的评论 { id, username }

        // Socket 连接
        let plazaSocket = null;

        // 统一登录函数 - 使用游戏页面的登录弹窗
        function openLoginPopup() {
            window.open('game.html?mode=auth', '_blank', 'width=450,height=600,scrollbars=yes');
        }

        // 监听登录成功消息
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'auth_login_success') {
                // 登录成功，刷新页面
                localStorage.setItem('authToken', event.data.token);
                window.location.reload();
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await checkLogin();
            await loadCaptcha();
            await loadPosts();
            initSocket();
            initEventListeners();
        });

        // 检查登录状态
        async function checkLogin() {
            const token = AuthManager.getToken();
            if (!token) {
                showToast('请先登录');
                openLoginPopup();
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/plaza/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    currentUser = data.data;
                    document.getElementById('userAvatar').textContent = currentUser.username.charAt(0).toUpperCase();
                }
            } catch (err) {
                console.error('获取用户信息失败:', err);
            }
        }

        // 加载验证码
        async function loadCaptcha() {
            try {
                const res = await fetch(`${API_BASE}/api/auth/captcha`);
                const data = await res.json();
                if (data.success) {
                    captchaId = data.captchaId;
                    document.getElementById('captchaImage').src = data.image;
                }
            } catch (err) {
                console.error('获取验证码失败:', err);
            }
        }

        // 加载帖子列表
        async function loadPosts(append = false) {
            if (isLoading) return;
            isLoading = true;

            const token = AuthManager.getToken();
            const url = `${API_BASE}/api/plaza/posts?page=${currentPage}&limit=20${searchKeyword ? '&keyword=' + encodeURIComponent(searchKeyword) : ''}`;

            try {
                const res = await fetch(url, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                const data = await res.json();

                if (data.success) {
                    const { posts, pagination } = data.data;
                    renderPosts(posts, append);

                    // 初始化懒加载
                    initImageLazyLoad();

                    // 加载PK团状态
                    posts.forEach(post => {
                        if (post.hasFreePKGroup && post.freePKGroupId) {
                            loadFreePKGroup(post.freePKGroupId);
                        }
                    });

                    if (currentPage >= pagination.totalPages) {
                        document.getElementById('postList').querySelector('.load-more')?.remove();
                    }
                }
            } catch (err) {
                console.error('加载帖子失败:', err);
            } finally {
                isLoading = false;
            }
        }

        // 渲染帖子列表
        function renderPosts(posts, append = false) {
            const container = document.getElementById('postList');
            if (!append) {
                container.innerHTML = '';
            }

            if (posts.length === 0 && !append) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">&#128172;</div>
                        <div class="empty-text">还没有帖子，快来发布第一个吧！</div>
                    </div>
                `;
                return;
            }

            const postsHtml = posts.map(post => {
                const avatarChar = post.username ? post.username.charAt(0).toUpperCase() : '?';
                const timeAgo = formatTimeAgo(post.created_at);
                const imagesHtml = renderImages(post.images);
                const menusHtml = renderMenus(post.menus);
                const freePKHtml = renderFreePKSection(post);

                return `
                    <div class="post-card" data-id="${post.id}">
                        <div class="post-header">
                            <div class="post-avatar">${avatarChar}</div>
                            <div class="post-info">
                                <div class="post-author">${escapeHtml(post.username || '匿名用户')}</div>
                                <div class="post-time">${timeAgo}</div>
                            </div>
                        </div>
                        <div class="post-title">${escapeHtml(post.title)}</div>
                        <div class="post-content">${escapeHtml(post.content)}</div>
                        ${imagesHtml}
                        ${menusHtml}
                        ${freePKHtml}
                        <div class="post-stats">
                            <div class="post-stat ${post.isLiked ? 'liked' : ''}" data-id="${post.id}" data-type="post" data-liked="${post.isLiked}">
                                <span class="post-stat-icon">${post.isLiked ? '&#10084;' : '&#9825;'}</span>
                                <span>${post.likes_count || 0}</span>
                            </div>
                            <div class="post-stat">
                                <span class="post-stat-icon">&#128172;</span>
                                <span>${post.comments_count || 0}</span>
                            </div>
                            <div class="post-stat">
                                <span class="post-stat-icon">&#128065;</span>
                                <span>${post.views_count || 0}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML += postsHtml;

            // 添加加载更多
            const loadMore = document.createElement('div');
            loadMore.className = 'load-more';
            loadMore.textContent = '加载更多';
            loadMore.onclick = () => {
                currentPage++;
                loadPosts(true);
            };
            container.appendChild(loadMore);

        // 图片懒加载观察器
        function initImageLazyLoad() {
            const imageObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        const src = img.dataset.src;
                        if (src) {
                            img.src = src;
                            img.classList.remove('lazy');
                            observer.unobserve(img);
                        }
                    }
                });
            }, {
                rootMargin: '50px 0px',
                threshold: 0.01
            });

            // 观察所有懒加载图片
            document.querySelectorAll('img.lazy').forEach(img => {
                imageObserver.observe(img);
            });
        }

        // 格式化时间
        function formatTimeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return '刚刚';
            if (minutes < 60) return `${minutes}分钟前`;
            if (hours < 24) return `${hours}小时前`;
            if (days < 7) return `${days}天前`;
            return date.toLocaleDateString('zh-CN');
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;

        // 初始化Socket
        function initSocket() {
            const token = AuthManager.getToken();
            if (!token) return;

            try {
                plazaSocket = io(`${API_BASE}/plaza`, {
                    auth: { token },
                    transports: ['websocket', 'polling']
                });

                plazaSocket.on('connect', () => {
                    console.log('[Plaza] Socket connected');
                });

                plazaSocket.on('connect_error', (err) => {
                    console.error('[Plaza] Socket connection error:', err.message);
                });

                plazaSocket.on('online_users', (data) => {
                    console.log('[Plaza] Online users:', data.count);
                    const onlineCountEl = document.getElementById('onlineCount');
                    if (onlineCountEl) {
                        onlineCountEl.textContent = data.count;
                    }
                });

                plazaSocket.on('new_post', (data) => {
                    // 新帖子通知（可以刷新或插入到列表顶部）
                    if (currentPage === 1 && !searchKeyword) {
                        loadPosts();
                    }
                });

                // 监听点赞更新（其他用户点赞时实时更新）
                plazaSocket.on('like_update', (data) => {
                    const { targetId, targetType, likes_count } = data;
                    // 更新帖子列表中的点赞数
                    document.querySelectorAll(`.post-stat[data-id="${targetId}"][data-type="post"]`).forEach(el => {
                        const countSpan = el.querySelector('span:last-child');
                        if (countSpan) {
                            countSpan.textContent = ' ' + likes_count;
                        }
                    });
                    // 如果在详情页，也更新详情页的点赞数
                    if (document.getElementById('detailPage').classList.contains('active')) {
                        const detailLikeBtn = document.getElementById('detailLikeBtn');
                        if (detailLikeBtn && detailLikeBtn.dataset.id === targetId) {
                            const countSpan = detailLikeBtn.querySelector('span:nth-child(2)');
                            if (countSpan) {
                                countSpan.textContent = ' ' + likes_count;
                            }
                        }
                    }
                });

                plazaSocket.on('like_notification', (data) => {
                    showNotification(data.message);
                });

                // 监听排行榜更新（PK团结束后实时更新）
                plazaSocket.on('leaderboard_update', (data) => {
                    console.log('[Plaza] 排行榜更新:', data);
                    // 可以选择刷新排行榜数据
                    if (typeof loadLeaderboardData === 'function') {
                        loadLeaderboardData();
                    }
                });

                // 监听PK团状态更新（包括进行中、完成、失败、过期等状态）
                plazaSocket.on('free_pk_update', (data) => {
                    console.log('[Plaza] PK团状态更新:', data);
                    const { groupId, status, message } = data;
                    // 刷新PK团状态显示
                    loadFreePKGroup(groupId);
                    // 如果在详情页，也刷新详情页
                    if (document.getElementById('detailPage').classList.contains('active') && currentPostId) {
                        loadDetailFreePK(groupId);
                    }
                    // 处理各种状态
                    if (status === 'completed') {
                        showToast('PK已完成！请查看结果');
                    } else if (status === 'failed') {
                        showToast(message || 'PK执行失败，请重试', 'error');
                    } else if (status === 'expired') {
                        showToast(message || 'PK团已过期', 'warning');
                    }
                });

                // 监听PK完成详细结果
                plazaSocket.on('pk_complete', (data) => {
                    console.log('[Plaza] PK完成:', data);
                    const { groupId, winnerUsername, totalPrize } = data;
                    // 刷新PK团状态
                    loadFreePKGroup(groupId);
                    // 如果在详情页，刷新详情
                    if (document.getElementById('detailPage').classList.contains('active') && currentPostId) {
                        loadDetailFreePK(groupId);
                    }
                    // 显示获胜通知
                    if (winnerUsername && totalPrize) {
                        showNotification(`${winnerUsername} 获得胜利！获得 ${totalPrize} 能量`);
                    }
                });

                plazaSocket.on('disconnect', () => {
                    console.log('[Plaza] Socket disconnected');
                });
            } catch (err) {
                console.error('[Plaza] Socket连接失败:', err);
            }
        }

        // 提交帖子
        async function submitPost() {
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            const captchaCode = document.getElementById('captchaCode').value.trim();

            if (!title) {
                showToast('请输入帖子标题');
                return;
            }
            if (!content) {
                showToast('请输入帖子内容');
                return;
            }
            if (!captchaCode) {
                showToast('请输入验证码');
                return;
            }

            // 验证菜单
            const validMenus = [];
            for (const menu of menus) {
                if (menu.name && menu.url) {
                    try {
                        new URL(menu.url);
                        validMenus.push(menu);
                    } catch (e) {
                        showToast('菜单链接格式不正确');
                        return;
                    }
                } else if (menu.name || menu.url) {
                    showToast('菜单名称和链接必须同时填写');
                    return;
                }
            }

            const btn = document.getElementById('submitPost');
            btn.disabled = true;
            btn.textContent = '发布中...';

            try {
                const token = AuthManager.getToken();
                const res = await fetch(`${API_BASE}/api/plaza/posts`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        title,
                        content,
                        captchaId,
                        captchaCode,
                        menus: validMenus
                    })
                });

                const data = await res.json();

                if (data.success) {
                    // 检查是否创建自由PK团
                    const enableFreePK = document.getElementById('enableFreePK').checked;
                    let postData = data.data;
                    
                    if (enableFreePK) {
                        // 创建自由PK团
                        const energyCost = parseInt(document.getElementById('pkEnergyCost').value) || 50;
                        const maxParticipants = parseInt(document.getElementById('pkMaxParticipants').value) || 4;
                        const validHours = parseInt(document.getElementById('pkValidHours').value) || 24;
                        const king = parseInt(document.getElementById('creatorKingInput').value) || 50;
                        const assassin = parseInt(document.getElementById('creatorAssassinInput').value) || 50;
                        
                        const pkRes = await fetch(`${API_BASE}/api/plaza/free-pk/create`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({
                                postId: postData.id,
                                energyCost,
                                maxParticipants,
                                validHours,
                                king,
                                assassin
                            })
                        });
                        
                        const pkData = await pkRes.json();
                        if (pkData.success) {
                            postData.hasFreePKGroup = true;
                            postData.freePKGroupId = pkData.data.groupId;
                            showToast('发布成功，自由PK团已创建！');
                        } else {
                            showToast('发布成功，但PK团创建失败：' + pkData.error);
                        }
                    } else {
                        showToast('发布成功');
                    }

                    // 乐观更新：直接插入新帖子到列表顶部
                    const postsContainer = document.getElementById('postList');
                    if (postsContainer && currentPage === 1 && !searchKeyword) {
                        newPost = postData;
                        newPost.isLiked = false;
                        newPost.created_at = new Date().toISOString();
                        const postHtml = renderPostCardHtml(newPost);
                        // 插入到容器开头
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = postHtml;
                        const newElement = tempDiv.firstElementChild;
                        postsContainer.insertBefore(newElement, postsContainer.firstChild);
                        // 初始化懒加载
                        initImageLazyLoad();
                    }

                    closePostModal();
                    loadCaptcha();
                } else {
                    showToast(data.error || '发布失败');
                    loadCaptcha();
                }
            } catch (err) {
                console.error('发布帖子失败:', err);
                showToast('发布失败，请重试');
                loadCaptcha();
            } finally {
                btn.disabled = false;
                btn.textContent = '发布';
            }
        }

        // 渲染详情页PK团
        function renderDetailFreePK(container, group) {
            const statusText = {
                'waiting': '等待中',

            const participants = group.participants || [];
            const winner = participants.find(p => p.status === 'winner');

            let participantsHtml = '';

                    participantsHtml += `
                        <div class="participant-slot" style="text-align: center;">

                            const defenderDist = Math.abs(100 - (r.defenderKing || 0) - (r.defenderAssassin || 0));

                            return `
                            <div style="padding: 10px; background: #f9f9f9; border-radius: 8px; margin-bottom: 8px; font-size: 12px;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                                    <div style="display: flex; align-items: center; gap: 8px;">
                                        <span style="color: ${isAttackerWin ? '#4caf50' : '#f44336'}; font-weight: 600;">
                                            ${escapeHtml(r.attackerUsername)}
                                        </span>
                                        <span style="color: #999;">vs</span>
                                        <span style="color: ${!isAttackerWin ? '#4caf50' : '#f44336'}; font-weight: 600;">
                                            ${escapeHtml(r.defenderUsername)}
                                        </span>
                                    </div>
                                    <span style="background: ${isAttackerWin ? '#4caf50' : '#f44336'}; color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px;">
                                        ${isAttackerWin ? escapeHtml(r.attackerUsername) + ' 胜' : escapeHtml(r.defenderUsername) + ' 胜'}

                                </div>
                                <div style="display: flex; justify-content: space-between; color: #666; font-size: 11px;">
                                    <div>
                                        <span>攻击: ${r.attackerKing || 0}</span> | 
                                        <span>防御: ${r.attackerAssassin || 0}</span> | 
                                        <span>距离: <strong>${attackerDist}</strong></span>
                                    </div>
                                    <div>
                                        <span>攻击: ${r.defenderKing || 0}</span> | 
                                        <span>防御: ${r.defenderAssassin || 0}</span> | 
                                        <span>距离: <strong>${defenderDist}</strong></span>
                                    </div>
                                </div>
                            </div>
                            `;
                        }).join('')}
                    </div>

            // 最终结果
            let resultHtml = '';
            if (group.status === 'completed' && winner) {
                resultHtml = `
                    <div style="margin-top: 16px; padding: 16px; background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 193, 7, 0.2)); border-radius: 12px; text-align: center; border: 2px solid #ffd700;">
                        <div style="font-size: 24px; margin-bottom: 8px;">🏆</div>
                        <div style="font-size: 18px; font-weight: bold; color: #9c27b0;">${escapeHtml(winner.username)} 获胜！</div>
                        <div style="color: #ff9800; margin-top: 4px;">获得 ${group.totalPrize} 能量</div>
                    </div>

            // 加入按钮

                const hasJoined = participants.some(p => p.userId === currentUser.id);
                if (!hasJoined) {
                    joinButtonHtml = `
                        <button class="btn btn-primary" style="width: 100%; margin-top: 16px; background: linear-gradient(135deg, #9c27b0, #ba68c8);" onclick="showJoinPKModal('${group.groupId}', ${group.energyCost})">
                            ⚔️ 加入PK团（消耗${group.energyCost}能量）

            // 手动开始PK按钮（只有创建者可以发起）
            let startButtonHtml = '';
            if (group.status === 'waiting' && currentUser && group.creatorId === currentUser.id && participants.length >= 2) {
                startButtonHtml = `
                    <button class="btn btn-secondary" style="width: 100%; margin-top: 8px; border-color: #9c27b0; color: #9c27b0;" onclick="startFreePK('${group.groupId}')">
                        ⚡ 手动开始PK（至少2人）
                    </button>
                `;
            }

            container.innerHTML = `
                <div style="margin: 16px 0; padding: 16px; background: linear-gradient(135deg, rgba(155, 89, 182, 0.1), rgba(142, 90, 180, 0.1)); border-radius: 12px; border: 1px solid rgba(155, 89, 182, 0.3);">
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
                        <span style="font-weight: 600; color: #9c27b0; font-size: 16px;">⚔️ 自由PK团</span>
                        <span style="color: ${statusColors[group.status]}; font-weight: 500;">${statusText[group.status]}</span>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-bottom: 16px;">
                        <span>参与能量: <strong>${group.energyCost}</strong></span>
                        <span>已参与: <strong>${participants.length}/${group.maxParticipants}</strong></span>
                        <span>奖池: <strong>${group.energyCost * participants.length}</strong></span>
                    </div>
                    
                    <div style="display: flex; justify-content: space-around; flex-wrap: wrap; gap: 10px;">
                        ${participantsHtml}
                    </div>
                    
                    ${pkProgressHtml}
                    ${resultHtml}
                    ${joinButtonHtml}
                    ${startButtonHtml}
                </div>
            `;
        }

        // 显示加入PK弹窗
        function showJoinPKModal(groupId, energyCost) {
            const modalHtml = `

        // 加入自由PK团
        async function joinFreePK(groupId) {
            const king = parseInt(document.getElementById('joinKingInput').value) || 50;
            const assassin = parseInt(document.getElementById('joinAssassinInput').value) || 50;

            try {
                const token = AuthManager.getToken();
                const res = await fetch(`${API_BASE}/api/plaza/free-pk/join`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ groupId, king, assassin })
                });

                const data = await res.json();
                if (data.success) {
                    document.getElementById('joinPKModal').remove();

                    // 检查PK是否已经开始
                    if (data.data && data.data.pkStarted) {
                        showToast('加入成功，PK即将开始！');
                        // 等待2秒后刷新查看结果
                        setTimeout(() => {
                            loadFreePKGroup(groupId);
                        }, 2000);
                    } else {
                        showToast(data.message || '加入成功，等待其他参与者...');
                        // 3秒后刷新状态
                        setTimeout(() => {
                            loadFreePKGroup(groupId);
                        }, 3000);
                    }
                } else {
                    showToast(data.error || '加入失败');
                }
            } catch (err) {
                console.error('加入PK团失败:', err);
                showToast('加入失败，请重试');
            }
        }

        // 手动开始PK团
        async function startFreePK(groupId) {
            if (!confirm('确认开始PK？至少需要2人参与。')) {
                return;
            }

            try {
                const token = AuthManager.getToken();
                const res = await fetch(`${API_BASE}/api/plaza/free-pk/start`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ groupId })
                });

                const data = await res.json();
                if (data.success) {
                    showToast(data.message || 'PK已开始，请稍候...');
                    // 等待2秒后刷新查看结果
                    setTimeout(() => {
                        loadFreePKGroup(groupId);
                    }, 2000);
                } else {
                    showToast(data.error || '开始失败');
                }
            } catch (err) {
                console.error('开始PK失败:', err);
                showToast('开始失败，请重试');
            }
        }

        // 加载评论
        async function loadComments(postId) {
            try {
                const token = AuthManager.getToken();
                const res = await fetch(`${API_BASE}/api/plaza/posts/${postId}/comments`, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('commentCount').textContent = data.data.length;
                    renderComments(data.data);
                }
            } catch (err) {
                console.error('加载评论失败:', err);
            }
        }

        // 渲染评论
        function renderComments(comments) {
            const container = document.getElementById('commentsList');

            if (comments.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-text">还没有评论，快来抢沙发吧！</div></div>';
                return;
            }

            const renderComment = (comment, isNested = false) => {
                const avatarChar = comment.username ? comment.username.charAt(0).toUpperCase() : '?';
                const timeAgo = formatTimeAgo(comment.created_at);
                // 如果有 replyTo 且不是一级评论，显示回复目标
                const replyToHtml = (comment.replyTo && comment.parentId !== '0')
                    ? `<span class="comment-reply-to">回复 <strong>@${escapeHtml(comment.replyTo)}</strong></span>`
                    : '';
                let html = `
                    <div class="comment-item ${isNested ? 'nested' : ''}" data-id="${comment.id}">
                        <div class="comment-header">
                            <div class="comment-avatar">${avatarChar}</div>
                            <span class="comment-author">${escapeHtml(comment.username || '匿名')}</span>
                            ${replyToHtml}
                            <span class="comment-time">${timeAgo}</span>
                        </div>
                        <div class="comment-content">${escapeHtml(comment.content)}</div>
                        <div class="comment-actions">
                            <div class="comment-action ${comment.isLiked ? 'liked' : ''}" data-id="${comment.id}" data-type="comment">
                                ${comment.isLiked ? '&#10084;' : '&#9825;'} ${comment.likes_count || 0}
                            </div>
                            ${!isNested ? `<div class="comment-action reply-btn" data-id="${comment.id}" data-username="${escapeHtml(comment.username || '匿名')}">&#128172; 回复</div>` : ''}
                        </div>
                    </div>
                `;

                if (comment.children && comment.children.length > 0) {
                    comment.children.forEach(child => {
                        html += renderComment(child, true);
                    });
                }

                return html;
            };

            container.innerHTML = comments.map(c => renderComment(c)).join('');

            // 点赞事件
            container.querySelectorAll('.comment-action[data-type="comment"]').forEach(el => {
                el.addEventListener('click', async function() {
                    await handleLike(this.dataset.id, this.dataset.type, this);
                    loadComments(currentPostId);
                });
            });
        }

        // 提交评论
        async function submitComment() {
            const content = document.getElementById('commentInput').value.trim();
            if (!content) {
                showToast('请输入评论内容');
                return;
            }

            const btn = document.getElementById('commentSubmit');
            const input = document.getElementById('commentInput');
            btn.disabled = true;
            btn.textContent = '发送中...';

            // 乐观更新：创建临时评论元素
            const tempId = 'temp-' + Date.now();
            const tempComment = {
                id: tempId,
                username: currentUser.username,
                content: content,
                created_at: new Date().toISOString(),
                isLiked: false,
                likes_count: 0,
                isPending: true
            };

            // 立即显示评论
            const container = document.getElementById('commentsList');
            const emptyState = container.querySelector('.empty-state');
            if (emptyState) {
                container.innerHTML = '';
            }
            const tempHtml = renderSingleComment(tempComment, false);
            container.insertAdjacentHTML('afterbegin', tempHtml);

            try {
                const token = AuthManager.getToken();
                const requestBody = {
                    postId: currentPostId,
                    content
                };
                // 如果是回复评论，添加 parentId
                if (replyingTo) {
                    requestBody.parentId = replyingTo.id;
                }

                const res = await fetch(`${API_BASE}/api/plaza/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(requestBody)
                });

                const data = await res.json();

                if (data.success) {
                    document.getElementById('commentInput').value = '';
                    // 成功后清除回复状态
                    cancelReply();
                    // 替换临时评论为真实评论
                    const tempEl = document.getElementById(tempId);
                    if (tempEl) {
                        tempEl.outerHTML = renderSingleComment(data.data, false);
                    }
                } else {
                    // 失败，移除临时评论
                    const tempEl = document.getElementById(tempId);
                    if (tempEl) tempEl.remove();
                    showToast(data.error || '评论失败');
                }
            } catch (err) {
                // 失败，移除临时评论
                const tempEl = document.getElementById(tempId);
                if (tempEl) tempEl.remove();
                console.error('评论失败:', err);
                showToast('评论失败，请重试');
            } finally {
                btn.disabled = false;
                btn.textContent = '发送';
            }
        }

        // 渲染单条评论（用于乐观更新）
        function renderSingleComment(comment, isNested = false) {
            const avatarChar = comment.username ? comment.username.charAt(0).toUpperCase() : '?';
            const timeAgo = comment.created_at ? formatTimeAgo(comment.created_at) : '刚刚';
            const pendingClass = comment.isPending ? 'pending' : '';
            // 如果有 replyTo 且不是一级评论，显示回复目标
            const replyToHtml = (comment.replyTo && comment.parentId !== '0')
                ? `<span class="comment-reply-to">回复 <strong>@${escapeHtml(comment.replyTo)}</strong></span>`
                : '';

            return `
                <div class="comment-item ${isNested ? 'nested' : ''} ${pendingClass}" data-id="${comment.id}" ${comment.isPending ? 'id="' + comment.id + '"' : ''}>
                    <div class="comment-header">
                        <div class="comment-avatar">${avatarChar}</div>
                        <span class="comment-author">${escapeHtml(comment.username || '匿名')}</span>
                        ${replyToHtml}
                        ${comment.isPending ? '<span class="comment-pending">[发送中]</span>' : ''}
                        <span class="comment-time">${timeAgo}</span>
                    </div>
                    <div class="comment-content">${escapeHtml(comment.content)}</div>
                    <div class="comment-actions">
                        <div class="comment-action ${comment.isLiked ? 'liked' : ''}" data-id="${comment.id}" data-type="comment">
                            ${comment.isLiked ? '&#10084;' : '&#9825;'} ${comment.likes_count || 0}
                        </div>
                        ${!isNested ? `<div class="comment-action reply-btn" data-id="${comment.id}" data-username="${escapeHtml(comment.username || '匿名')}">&#128172; 回复</div>` : ''}
                    </div>
                </div>
            `;
        }

        // 点赞
        async function handleLike(targetId, targetType, element) {
            const token = AuthManager.getToken();
            if (!token) {
                showToast('请先登录');
                openLoginPopup();
                return;
            }

            // 防止重复点击
            if (element.classList.contains('liking')) return;
            element.classList.add('liking');

            // 乐观更新：先保存当前状态
            const wasLiked = element.classList.contains('liked');
            const countSpan = element.classList.contains('comment-action')
                ? element : element.querySelector('span:last-child') || element.querySelector('span:nth-child(2)');
            const currentCount = countSpan ? parseInt(countSpan.textContent.trim()) || 0 : 0;

            // 立即更新UI
            element.classList.toggle('liked', !wasLiked);
            const newCount = wasLiked ? Math.max(0, currentCount - 1) : currentCount + 1;
            if (element.classList.contains('comment-action')) {
                element.innerHTML = `${!wasLiked ? '&#10084;' : '&#9825;'} ${newCount}`;
            } else {
                const span = element.querySelector('span:last-child');
                if (span) span.textContent = ' ' + newCount;
            }

            try {
                const res = await fetch(`${API_BASE}/api/plaza/like`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        targetId: targetId,
                        targetType
                    })
                });

                const data = await res.json();

                if (data.success) {
                    const isLiked = data.data.isLiked;
                    const likesCount = data.data.likes_count;

                    // 使用服务器返回的准确数值更新UI
                    if (element.classList.contains('post-stat')) {
                        element.classList.toggle('liked', isLiked);
                        const span = element.querySelector('span:last-child');
                        if (span) span.textContent = ' ' + likesCount;
                    } else if (element.classList.contains('comment-action')) {
                        element.classList.toggle('liked', isLiked);
                        element.innerHTML = `${isLiked ? '&#10084;' : '&#9825;'} ${likesCount}`;
                    } else if (element.id === 'detailLikeBtn') {
                        element.classList.toggle('liked', isLiked);
                        const span = element.querySelector('span:nth-child(2)');
                        if (span) span.textContent = ' ' + likesCount;
                    }

                    // 发送通知
                    if (plazaSocket && isLiked) {
                        plazaSocket.emit('like_notify', {
                            targetType,
                            targetId: targetId,
                            authorId: currentUser.id
                        });
                    }
                } else {
                    // 服务器返回错误，回滚状态
                    element.classList.toggle('liked', wasLiked);
                    if (element.classList.contains('comment-action')) {
                        element.innerHTML = `${wasLiked ? '&#10084;' : '&#9825;'} ${currentCount}`;
                    } else {
                        const span = element.querySelector('span:last-child');
                        if (span) span.textContent = ' ' + currentCount;
                    }
                    showToast(data.error || '操作失败');
                }
            } catch (err) {
                // 网络错误，回滚状态
                element.classList.toggle('liked', wasLiked);
                if (element.classList.contains('comment-action')) {
                    element.innerHTML = `${wasLiked ? '&#10084;' : '&#9825;'} ${currentCount}`;
                } else {
                    const span = element.querySelector('span:last-child');
                    if (span) span.textContent = ' ' + currentCount;
                }
                console.error('点赞失败:', err);
                showToast('网络错误，请重试');
            } finally {
                element.classList.remove('liking');
            }
        }

        // 关闭详情页
        function closeDetail() {
            document.getElementById('detailPage').classList.remove('active');
            currentPostId = null;
            currentPage = 1;
            replyingTo = null; // 重置回复状态
            loadPosts();
        }

        // 处理回复
        function handleReply(commentId, username) {
            replyingTo = { id: commentId, username: username };
            const input = document.getElementById('commentInput');
            input.placeholder = `回复 @${username}:`;
            input.focus();
            updateReplyStatus();
        }

        // 取消回复
        function cancelReply() {
            replyingTo = null;
            const input = document.getElementById('commentInput');
            input.placeholder = '写评论...';
            updateReplyStatus();
        }

        // 更新回复状态显示
        function updateReplyStatus() {
            let statusEl = document.getElementById('replyStatus');
            if (!statusEl) {
                // 创建回复状态元素
                const inputWrapper = document.querySelector('.comment-input-wrapper');
                statusEl = document.createElement('div');
                statusEl.id = 'replyStatus';
                statusEl.className = 'reply-status';
                inputWrapper.parentNode.insertBefore(statusEl, inputWrapper);
            }

            if (replyingTo) {
                statusEl.innerHTML = `<span>回复 <strong>@${escapeHtml(replyingTo.username)}</strong> <span class="cancel-reply" style="cursor:pointer;color:var(--plaza-primary);margin-left:8px;">取消</span></span>`;
                statusEl.style.display = 'block';
            } else {
                statusEl.style.display = 'none';
            }
        }

        // 显示Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // 显示通知
        function showNotification(message) {
            const notif = document.getElementById('notification');
            document.getElementById('notificationText').textContent = message;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 4000);
        }

        // 显示我的PK团记录
        async function showMyPKRecords() {
            try {
                const token = AuthManager.getToken();
                const res = await fetch(`${API_BASE}/api/plaza/free-pk/my`, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                const data = await res.json();

                if (!data.success) {
                    showToast(data.error || '获取记录失败');
                    return;
                }

                const { list } = data.data;

                if (list.length === 0) {
                    showToast('您还没有参与过PK团');
                    return;
                }

                // 构建显示HTML
                let html = `
                    <div class="modal-overlay active" id="myPKModal">
                        <div class="modal-content" style="max-width: 500px; max-height: 80vh; overflow-y: auto;">
                            <div class="modal-header">
                                <span class="modal-title">我的PK团记录</span>
                                <button class="modal-close" onclick="document.getElementById('myPKModal').remove()">&times;</button>
                            </div>
                            <div class="modal-body">
                `;

                list.forEach(item => {
                    // PK团状态映射
                    const groupStatusText = {
                        'waiting': '⏳ 等待中',
                        'ongoing': '⚔️ PK进行中',
                        'completed': '🏆 已结束',
                        'expired': '⏰ 已过期'
                    };
                    const groupStatusColor = {
                        'waiting': '#ff9800',
                        'ongoing': '#2196f3',
                        'completed': '#4caf50',
                        'expired': '#9e9e9e'
                    };

                    html += `
                        <div style="padding: 12px; background: #f9f9f9; border-radius: 8px; margin-bottom: 12px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                <span style="font-weight: 600; color: #333;">PK团 #${item.groupId.substring(0, 8)}</span>
                                <span style="color: ${groupStatusColor[item.status] || '#666'}; font-weight: bold;">${groupStatusText[item.status] || item.status}</span>
                            </div>
                            <div style="font-size: 12px; color: #666; margin-bottom: 6px;">
                                <div>攻击: ${item.king} | 防御: ${item.assassin}</div>
                                <div>参与能量: ${item.energyCost} | 人数: ${item.maxParticipants}</div>
                                <div>时间: ${item.createdAt ? new Date(item.createdAt).toLocaleString() : '未知'}</div>
                            </div>
                            <div style="display: flex; gap: 12px; font-size: 12px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee;">
                                <span style="color: ${item.energyChange >= 0 ? '#4caf50' : '#f44336'};">
                                    能量: ${item.energyChange >= 0 ? '+' : ''}${item.energyChange}
                                </span>
                                <span style="color: ${item.fortuneChange >= 0 ? '#9c27b0' : '#666'};">
                                    福力: ${item.fortuneChange >= 0 ? '+' : ''}${item.fortuneChange}
                                </span>
                                <span style="color: ${item.contributionChange >= 0 ? '#2196f3' : '#666'};">
                                    贡献: ${item.contributionChange >= 0 ? '+' : ''}${item.contributionChange}
                                </span>
                            </div>
                        </div>
                    `;
                });

                html += `
                            </div>
                        </div>
                    </div>
                `;

                document.body.insertAdjacentHTML('beforeend', html);
            } catch (err) {
                console.error('获取PK团记录失败:', err);
                showToast('获取记录失败');
            }
        }
    </script>
